<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Auth callback</title>
  <style>
    body { font-family: system-ui,Segoe UI,Roboto,Arial; padding: 1rem; }
    pre { background:#f4f4f4; padding:0.5rem; border-radius:4px; }
    .ok { color: green; }
    .err { color: darkred; }
  </style>
</head>
<body>
  <h1>Auth callback</h1>
  <div id="out">Token alınıyor...</div>

  <script>
    // Parse fragment like: #access_token=...&refresh_token=...&expires_at=...
    function parseFragment(hash) {
      if (!hash) return {};
      if (hash.startsWith('#')) hash = hash.substring(1);
      const parts = hash.split('&');
      const obj = {};
      for (const p of parts) {
        const [k,v] = p.split('=');
        if (k) obj[decodeURIComponent(k)] = v ? decodeURIComponent(v) : '';
      }
      return obj;
    }

    // Base64url decode
    function base64UrlDecode(input) {
      input = input.replace(/-/g, '+').replace(/_/g, '/');
      // pad
      const pad = input.length % 4;
      if (pad) input += '='.repeat(4 - pad);
      try {
        return decodeURIComponent(atob(input).split('').map(c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)).join(''));
      } catch (e) {
        return null;
      }
    }

    (function () {
      const out = document.getElementById('out');
      const frag = parseFragment(location.hash);
      if (!frag || Object.keys(frag).length === 0) {
        out.innerHTML = '<p class="err">Sayfa fragmentinde token bulunamadı. Supabase redirect URL\'inizi kontrol edin.</p>';
        return;
      }

      // Store tokens in sessionStorage (safer than localStorage for this use-case)
      try {
        sessionStorage.setItem('supabase_access_token', frag.access_token || '');
        sessionStorage.setItem('supabase_refresh_token', frag.refresh_token || '');
        sessionStorage.setItem('supabase_token_type', frag.token_type || '');
        if (frag.expires_at) sessionStorage.setItem('supabase_expires_at', frag.expires_at);
        sessionStorage.setItem('supabase_raw_fragment', JSON.stringify(frag));
      } catch (e) {
        console.warn('sessionStorage set failed', e);
      }

      // Try decode JWT payload to show user email (access_token is JWT)
      let infoHtml = '<h3 class="ok">Token alındı</h3><ul>';
      if (frag.access_token) {
        const parts = frag.access_token.split('.');
        if (parts.length >= 2) {
          const payload = base64UrlDecode(parts[1]);
          if (payload) {
            try {
              const obj = JSON.parse(payload);
              if (obj.email) infoHtml += `<li>E-posta: <strong>${obj.email}</strong></li>`;
              if (obj.sub) infoHtml += `<li>Sub: ${obj.sub}</li>`;
              if (obj.exp) infoHtml += `<li>Exp (unix): ${obj.exp}</li>`;
            } catch (e) { /* ignore */ }
          }
        }
      }
      if (frag.expires_at) infoHtml += `<li>expires_at: ${frag.expires_at}</li>`;
      if (frag.token_type) infoHtml += `<li>token_type: ${frag.token_type}</li>`;
      infoHtml += '</ul>';

      out.innerHTML = infoHtml + '<p>Yakında yönlendirme yapılacak...</p>';

      // Optional: notify plugin or server with the access token (only if you have a secure endpoint)
      // Example (UNSAFE to expose service_role): send token to local plugin endpoint that accepts user tokens:
      // fetch('http://localhost:5001/auth/callback', { method:'POST', headers:{ 'Content-Type':'application/json' }, body: JSON.stringify({ access_token: frag.access_token }) });

      // Clear fragment from URL (so refresh won't re-expose tokens)
      if (history && history.replaceState) {
        history.replaceState(null, document.title, window.location.pathname + window.location.search);
      } else {
        location.hash = '';
      }

      // Redirect to status page or dashboard after short delay
      setTimeout(() => {
        window.location.href = '/static/status.html'; // veya 'status.html' kullandığın yapıma göre
      }, 1200);
    })();
  </script>
</body>
</html>
