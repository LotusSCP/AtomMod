<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Discord Bağlama</title>
    <style>
        body { font-family: Arial; background: #0a0a0a; color: #0f0; text-align: center; padding: 100px; }
        .success { color: #0f0; font-size: 26px; }
    </style>
</head>
<body>
    <h1>Discord Bağlama İşlemi</h1>
    <div id="status">Bağlantı kuruluyor...</div>

    <script src="supabase.js"></script>

    <script>
        async function completeDiscordLink() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const accessToken = params.get('access_token');

            if (!accessToken) {
                document.getElementById('status').innerHTML = "❌ Token alınamadı. Lütfen tekrar deneyin.";
                return;
            }

            try {
                // 1. Discord'dan kullanıcı bilgisini al
                const userRes = await fetch('https://discord.com/api/users/@me', {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });

                const user = await userRes.json();

                if (!user.id) {
                    throw new Error("Kullanıcı bilgisi alınamadı");
                }

                // 2. Supabase'te discord_id ve discord_username güncelle
                // (Kullanıcıyı username veya başka bir şekilde bulman gerekebilir. Şimdilik örnek olarak son hesap güncelleniyor)
                const supabaseUrl = "https://kdvvvldbetjthldhodab.supabase.co"; // kendi url'ini yaz
                const anonKey = "YOUR_ANON_KEY"; // kendi anon key'ini yaz

                // NOT: Gerçek uygulamada hangi hesabın bağlandığını bilmek için username veya session kullanman lazım.
                // Şimdilik basitçe localStorage'dan username alıyoruz (login sonrası ekle)
                const currentUsername = localStorage.getItem('current_username') || "admin"; // login sonrası buraya username kaydet

                const updateUrl = `${supabaseUrl}/rest/v1/accounts?username=eq.${encodeURIComponent(currentUsername)}`;

                const updateBody = {
                    discord_id: user.id,
                    discord_username: user.username + "#" + user.discriminator,
                    linked_at: new Date().toISOString()
                };

                const res = await fetch(updateUrl, {
                    method: 'PATCH',
                    headers: {
                        'apikey': anonKey,
                        'Authorization': `Bearer ${anonKey}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify(updateBody)
                });

                if (res.ok) {
                    localStorage.setItem('discord_linked', 'true');
                    localStorage.setItem('discord_id', user.id);
                    document.getElementById('status').innerHTML = `
                        <span class="success">✅ Discord hesabınız başarıyla bağlandı!</span><br><br>
                        Discord ID: ${user.id}<br>
                        Kullanıcı: ${user.username}<br><br>
                        <a href="sendcommandwiacedmod.html" style="color:#0f0; font-size:20px;">Komut Paneline Dön</a>
                    `;
                } else {
                    throw new Error("Supabase güncellenemedi");
                }
            } catch (err) {
                document.getElementById('status').innerHTML = `❌ Hata: ${err.message}`;
                console.error(err);
            }
        }

        window.onload = completeDiscordLink;
    </script>
</body>
</html>
