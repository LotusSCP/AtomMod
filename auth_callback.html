<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Discord Bağlama</title>
    <style>
        body { font-family: Arial; background: #0a0a0a; color: #0f0; text-align: center; padding: 80px; }
        .success { color: #0f0; font-size: 24px; }
        .error { color: #ff6666; }
    </style>
</head>
<body>
    <h1>Discord Bağlama</h1>
    <div id="status">İşlem yapılıyor...</div>

    <script>
        async function completeDiscordLink() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const accessToken = params.get('access_token');

            if (!accessToken) {
                document.getElementById('status').innerHTML = `<span class="error">❌ Token alınamadı.</span>`;
                return;
            }

            try {
                // Discord'dan kullanıcı bilgisi al
                const userRes = await fetch('https://discord.com/api/users/@me', {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });

                if (!userRes.ok) throw new Error("Discord API hatası");

                const user = await userRes.json();

                // Supabase ayarları (kendi bilgilerini yaz)
                const SUPABASE_URL = "https://kdvvvldbetjthldhodab.supabase.co";
                const ANON_KEY = "BURAYA_ANON_KEY_INI_YAZ";   // ← Buraya kendi anon key'ini yaz

                // Hangi hesabı güncelleyeceğimizi bilmek için (login sonrası kaydetmen lazım)
                const currentUsername = localStorage.getItem('current_username') || "admin";

                const updateUrl = `${SUPABASE_URL}/rest/v1/accounts?username=eq.${encodeURIComponent(currentUsername)}`;

                const body = {
                    discord_id: user.id.toString(),
                    discord_username: user.username + (user.discriminator ? "#" + user.discriminator : ""),
                    linked_at: new Date().toISOString()
                };

                const res = await fetch(updateUrl, {
                    method: 'PATCH',
                    headers: {
                        'apikey': ANON_KEY,
                        'Authorization': `Bearer ${ANON_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify(body)
                });

                if (res.ok) {
                    localStorage.setItem('discord_linked', 'true');
                    localStorage.setItem('discord_id', user.id);
                    document.getElementById('status').innerHTML = `
                        <span class="success">✅ Başarıyla bağlandı!</span><br><br>
                        Discord ID: ${user.id}<br>
                        Kullanıcı: ${user.username}<br><br>
                        <a href="sendcommandwiacedmod.html" style="color:#0f0;">Komut Paneline Dön →</a>
                    `;
                } else {
                    const errText = await res.text();
                    throw new Error(`Supabase hatası: ${res.status} - ${errText}`);
                }
            } catch (err) {
                console.error(err);
                document.getElementById('status').innerHTML = `<span class="error">❌ Hata: ${err.message}</span>`;
            }
        }

        window.onload = completeDiscordLink;
    </script>
</body>
</html>
