<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Discord Bağlama</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background: #0a0a0a; 
            color: #0f0; 
            text-align: center; 
            padding: 100px 20px; 
        }
        .success { color: #0f0; font-size: 26px; }
        .error { color: #ff6666; font-size: 22px; }
        a { color: #0f0; text-decoration: none; font-size: 18px; }
    </style>
</head>
<body>
    <h1>Discord Hesap Bağlama</h1>
    <div id="status">İşlem yapılıyor, lütfen bekleyin...</div>

    <script>
        async function completeDiscordLink() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const accessToken = params.get('access_token');

            if (!accessToken) {
                document.getElementById('status').innerHTML = `<span class="error">❌ Token alınamadı. Lütfen tekrar deneyin.</span>`;
                return;
            }

            // Giriş yapmış kullanıcının adını al
            const currentUsername = localStorage.getItem('atommod_lastuser');

            if (!currentUsername) {
                document.getElementById('status').innerHTML = `
                    <span class="error">❌ Önce giriş yapmalısınız!</span><br><br>
                    <a href="login.html">→ Giriş Yap</a>
                `;
                return;
            }

            try {
                // Discord kullanıcı bilgisini al
                const userRes = await fetch('https://discord.com/api/users/@me', {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });

                if (!userRes.ok) throw new Error("Discord API hatası");

                const user = await userRes.json();

                // Config.json'dan Supabase bilgilerini çek
                const configRes = await fetch('https://lotusscp.github.io/atommodapi/config.json');
                const CONFIG = await configRes.json();

                const SUPABASE_URL = CONFIG.supabase.url;
                const ANON_KEY = CONFIG.supabase.anon_key;

                // Doğru hesabı güncelle
                const updateUrl = `${SUPABASE_URL}/rest/v1/accounts?username=eq.${encodeURIComponent(currentUsername)}`;

                const body = {
                    discord_id: user.id.toString(),
                    discord_username: user.username + (user.discriminator ? "#" + user.discriminator : ""),
                    linked_at: new Date().toISOString()
                };

                const res = await fetch(updateUrl, {
                    method: 'PATCH',
                    headers: {
                        'apikey': ANON_KEY,
                        'Authorization': `Bearer ${ANON_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify(body)
                });

                if (res.ok) {
                    localStorage.setItem('discord_linked', 'true');
                    localStorage.setItem('discord_id', user.id);
                    localStorage.setItem('discord_username', user.username);

                    document.getElementById('status').innerHTML = `
                        <span class="success">✅ Başarıyla bağlandı!</span><br><br>
                        Discord: ${user.username}<br>
                        Bağlanan Hesap: <strong>${currentUsername}</strong><br><br>
                        <a href="sendcommandwiacedmod.html">→ Komut Paneline Dön</a>
                    `;
                } else {
                    const errText = await res.text();
                    throw new Error(`Supabase hatası: ${res.status} - ${errText}`);
                }
            } catch (err) {
                console.error(err);
                document.getElementById('status').innerHTML = `
                    <span class="error">❌ Hata oluştu: ${err.message}</span><br><br>
                    <a href="accountsettings.html">← Tekrar Dene</a>
                `;
            }
        }

        window.onload = completeDiscordLink;
    </script>
</body>
</html>
