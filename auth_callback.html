<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Discord Bağlama - Callback</title>
    <style>
        body { font-family: Arial; background: #0a0a0a; color: #0f0; text-align: center; padding: 80px; }
        .success { color: #0f0; font-size: 24px; }
    </style>
</head>
<body>
    <h1>Discord Bağlama</h1>
    <div id="status">Token alınıyor...</div>

    <script>
        async function handleOAuthCallback() {
            const hash = window.location.hash.substring(1);
            const params = new URLSearchParams(hash);
            const accessToken = params.get('access_token');

            if (!accessToken) {
                document.getElementById('status').innerHTML = "❌ Token alınamadı. Lütfen tekrar deneyin.";
                return;
            }

            // Token'ı localStorage'a kaydet (gerçekte Supabase'e kaydedilecek)
            localStorage.setItem('discord_access_token', accessToken);
            localStorage.setItem('discord_linked', 'true');

            document.getElementById('status').innerHTML = `
                <span class="success">✅ Discord hesabınız başarıyla bağlandı!</span><br><br>
                <a href="sendcommandwiacedmod.html" style="color:#0f0; font-size:18px;">Komut Paneline Dön</a>
            `;

            // İsteğe bağlı: Discord API'den kullanıcı bilgisi al
            try {
                const userRes = await fetch('https://discord.com/api/users/@me', {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const user = await userRes.json();
                console.log("Discord Kullanıcısı:", user);
            } catch (e) {}
        }

        window.onload = handleOAuthCallback;
    </script>
</body>
</html>
