<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AtomMod - Giriş Yap</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <h1>Giriş Yap</h1>
        <form id="loginForm">
            <label>Kullanıcı adı:<br><input type="text" id="username" required></label>
            <label>Şifre:<br><input type="password" id="password" required></label>
            <label><input type="checkbox" id="rememberMe" checked> Beni Hatırla</label>
            <button type="submit" id="submitBtn">Giriş Yap</button>
        </form>
        <div id="result"></div>
        <p><a href="index.html">Ana Sayfa</a> | <a href="register.html">Kayıt Ol</a></p>
    </main>

    <script src="supabase.js"></script>
    <script src="app.js"></script>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('rememberMe').checked;
            const resEl = document.getElementById('result');
            const btn = document.getElementById('submitBtn');

            btn.disabled = true;
            resEl.innerHTML = 'Giriş yapılıyor...';

            try {
                // Şu an basit placeholder (gerçek şifre kontrolü için backend veya Supabase Auth eklenebilir)
                // Şimdilik başarılı kabul ediyoruz
                resEl.innerHTML = '✅ <strong>Giriş başarılı!</strong>';

                localStorage.setItem('atommod_logged_in', 'true');
                if (remember) localStorage.setItem('atommod_lastuser', username);

                setTimeout(() => window.location.href = 'index.html', 800);
            } catch (err) {
                resEl.innerHTML = `❌ Hata: ${err.message}`;
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
