<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AtomMod - Giriş Yap</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <h1>Giriş Yap</h1>
        <form id="loginForm">
            <label>Kullanıcı adı / E-posta:<br><input type="text" id="username" required></label>
            <label>Şifre:<br><input type="password" id="password" required></label>
            <label><input type="checkbox" id="rememberMe"> Beni Hatırla</label>
            <label><input type="checkbox" id="useSupabaseAuth" checked> Supabase Auth kullan</label>
            <button type="submit" id="submitBtn">Giriş Yap</button>
        </form>
        <div id="result"></div>
        <p><a href="index.html">Ana Sayfa</a> | <a href="register.html">Kayıt Ol</a></p>
    </main>

    <script src="supabase.js"></script>
    <script src="app.js"></script>

    <script>
        const baseUrl = 'http://localhost:5001';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const remember = document.getElementById('rememberMe').checked;
            const useSupabase = document.getElementById('useSupabaseAuth').checked;
            const resEl = document.getElementById('result');
            const btn = document.getElementById('submitBtn');

            btn.disabled = true;
            resEl.textContent = 'Giriş yapılıyor...';

            try {
                if (useSupabase) {
                    const result = await window.supabaseUtils.signIn(
                        window.atommodApp.defaultSupabaseUrl,
                        window.atommodApp.defaultSupabaseAnon,
                        username, password
                    );

                    if (result.ok) {
                        resEl.textContent = '✅ Giriş başarılı!';
                        if (remember) localStorage.setItem('atommod_lastuser', username);
                        setTimeout(() => window.location.href = 'status.html', 800);
                    } else {
                        resEl.textContent = `❌ ${result.error?.message || 'Giriş başarısız'}`;
                    }
                } else {
                    // Backend login
                    const res = await fetch(baseUrl + '/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        resEl.textContent = '✅ Giriş başarılı!';
                        if (remember) localStorage.setItem('atommod_lastuser', username);
                        setTimeout(() => window.location.href = 'status.html', 800);
                    } else {
                        resEl.textContent = `❌ ${data.error || 'Geçersiz bilgi'}`;
                    }
                }
            } catch (err) {
                resEl.textContent = `❌ Hata: ${err.message}`;
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
