<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AtomMod - Hesap Ayarları</title>
    <style>
        body { background: #0a0a0a; color: #ddd; font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 40px auto; padding: 30px; background: #111; border-radius: 12px; border: 2px solid #0f0; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #1e1e1e; color: white; border: 1px solid #0f0; border-radius: 6px; }
        button { width: 100%; padding: 14px; margin-top: 15px; background: #0f0; color: black; border: none; border-radius: 8px; font-size: 17px; cursor: pointer; }
        button:hover { background: #0c0; }
        .section { margin: 25px 0; padding: 20px; background: #1a1a1a; border-radius: 8px; }
        .success { color: #0f0; }
        .error { color: #ff6666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ Hesap Ayarları</h1>
        <p id="status" style="text-align:center;"></p>

        <div class="section">
            <h3>Discord Hesabı Bağla</h3>
            <button onclick="linkDiscord()">Discord Bağla</button>
            <p id="discordStatus"></p>
        </div>

        <div class="section">
            <h3>Şifre Değiştir</h3>
            <input type="password" id="newPassword" placeholder="Yeni Şifre">
            <button onclick="changePassword()">Şifreyi Değiştir</button>
        </div>

        <div class="section">
            <h3>E-posta Değiştir</h3>
            <input type="email" id="newEmail" placeholder="Yeni E-posta">
            <button onclick="changeEmail()">E-postayı Değiştir</button>
        </div>

        <p><a href="index.html">← Ana Sayfa</a> | <a href="sendcommandwiacedmod.html">Komut Paneli</a></p>
    </div>

    <script src="supabase.js"></script>
    <script src="app.js"></script>

    <script>
        async function linkDiscord() {
            const token = prompt("Discord tokeninizi girin (.linkaccount komutu ile alın):");
            if (!token) return;

            // Supabase'e Discord bilgilerini kaydet (gerçek token doğrulama için)
            alert("Discord bağlandı! (Simüle - Gerçekte Supabase güncellenecek)");
            localStorage.setItem('discord_linked', 'true');
            document.getElementById('discordStatus').innerHTML = "✅ Discord hesabınız bağlandı.";
        }

        async function changePassword() {
            const newPass = document.getElementById('newPassword').value.trim();
            if (!newPass) return alert("Yeni şifre girin!");
            alert("Şifre değiştirildi (Simüle)");
        }

        async function changeEmail() {
            const newEmail = document.getElementById('newEmail').value.trim();
            if (!newEmail) return alert("Yeni e-posta girin!");
            alert("E-posta değiştirildi (Simüle)");
        }
    </script>
</body>
</html>
