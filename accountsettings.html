<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Hesap Ayarları - AtomMod</title>
    <style>
        :root { --primary: #00ff41; --bg: #0a0a0a; --card: #111; }
        body { background: var(--bg); color: #ddd; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; }
        .container {
            max-width: 700px;
            margin: 60px auto;
            padding: 40px;
            background: var(--card);
            border-radius: 16px;
            border: 2px solid var(--primary);
        }
        h1 { text-align: center; color: var(--primary); }
        .section {
            background: #1a1a1a;
            padding: 25px;
            border-radius: 12px;
            margin: 25px 0;
        }
        button {
            width: 100%;
            padding: 16px;
            margin: 10px 0;
            background: #5865F2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            cursor: pointer;
        }
        button:hover { background: #4752C4; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ Hesap Ayarları</h1>

        <div class="section">
            <h3>Discord Hesabı Bağla</h3>
            <a href="https://discord.com/oauth2/authorize?client_id=1456256602439942207&response_type=token&redirect_uri=https%3A%2F%2Flotusscp.github.io%2FAtomMod%2Fauth_callback.html&scope=identify%20email" style="text-decoration:none;">
                <button>🔗 Discord ile Bağlan</button>
            </a>
        </div>

        <div class="section">
            <h3>Steam ID Bağla</h3>
            <p>Oyun içinde şu komutu kullanın:<br><code>.linkaccount &lt;email&gt; &lt;password&gt;</code></p>
        </div>

        <p style="text-align:center; margin-top:30px;">
            <a href="sendcommandwiacedmod.html" style="color:#0f0; font-size:18px;">← Komut Paneline Dön</a>
        </p>
    </div>
</body>
</html>
