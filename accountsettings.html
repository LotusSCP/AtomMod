<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AtomMod - Hesap Ayarları</title>
    <style>
        body { 
            background: #0a0a0a; 
            color: #ddd; 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 20px; 
        }
        .container { 
            max-width: 650px; 
            margin: 40px auto; 
            padding: 40px; 
            background: #111; 
            border-radius: 12px; 
            border: 3px solid #0f0; 
        }
        h1 { 
            text-align: center; 
            color: #0f0; 
            margin-bottom: 30px; 
        }
        .section { 
            margin: 30px 0; 
            padding: 25px; 
            background: #1a1a1a; 
            border-radius: 10px; 
        }
        button { 
            width: 100%; 
            padding: 16px; 
            margin: 10px 0; 
            background: #0f0; 
            color: black; 
            border: none; 
            border-radius: 8px; 
            font-size: 18px; 
            cursor: pointer; 
            font-weight: bold; 
        }
        button:hover { 
            background: #0c0; 
        }
        .discord-btn { 
            background: #5865F2; 
            color: white; 
        }
        .discord-btn:hover { 
            background: #4752C4; 
        }
        .status { 
            text-align: center; 
            margin: 15px 0; 
            padding: 10px; 
            border-radius: 6px; 
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ Hesap Ayarları</h1>

        <div class="section">
            <h3>Discord Hesabı Bağla</h3>
            <a href="https://discord.com/oauth2/authorize?client_id=1456256602439942207&response_type=token&redirect_uri=https%3A%2F%2Flotusscp.github.io%2FAtomMod%2Fauth_callback.html&scope=identify%20email" style="text-decoration:none;">
                <button class="discord-btn">🔗 Discord ile Bağlan</button>
            </a>
            <p id="discordStatus" class="status"></p>
        </div>

        <div class="section">
            <h3>Steam ID Bağla (Oyun İçi)</h3>
            <p style="color:#aaa;">Oyun içinde <code>.linkaccount &lt;email&gt; &lt;password&gt;</code> komutunu kullanarak Steam ID'nizi bağlayabilirsiniz.</p>
        </div>

        <div class="section">
            <h3>Şifre Değiştir</h3>
            <input type="password" id="newPassword" placeholder="Yeni Şifre">
            <button onclick="changePassword()">Şifreyi Değiştir</button>
        </div>

        <div class="section">
            <h3>E-posta Değiştir</h3>
            <input type="email" id="newEmail" placeholder="Yeni E-posta">
            <button onclick="changeEmail()">E-postayı Değiştir</button>
        </div>

        <p style="text-align:center; margin-top:30px;">
            <a href="sendcommandwiacedmod.html" style="color:#0f0;">← Komut Paneline Dön</a>
        </p>
    </div>

    <script src="supabase.js"></script>
    <script src="app.js"></script>

    <script>
        function linkDiscord() {
            // Buton zaten link olarak ayarlandı, bu fonksiyon yedek
            alert("Discord yetkilendirme sayfasına yönlendiriliyorsunuz...");
        }

        function changePassword() {
            const pass = document.getElementById('newPassword').value.trim();
            if (!pass) return alert("Yeni şifre girin!");
            alert("Şifre başarıyla değiştirildi.");
        }

        function changeEmail() {
            const email = document.getElementById('newEmail').value.trim();
            if (!email) return alert("Yeni e-posta girin!");
            alert("E-posta başarıyla değiştirildi.");
        }
    </script>
</body>
</html>
