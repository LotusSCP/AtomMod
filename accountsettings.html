<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AtomMod - Hesap Ayarları</title>
    <style>
        body { background: #0a0a0a; color: #ddd; font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 650px; margin: 40px auto; padding: 30px; background: #111; border-radius: 12px; border: 2px solid #0f0; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #1e1e1e; color: white; border: 1px solid #0f0; border-radius: 6px; }
        button { width: 100%; padding: 14px; margin-top: 15px; background: #0f0; color: black; border: none; border-radius: 8px; font-size: 17px; cursor: pointer; }
        button:hover { background: #0c0; }
        .section { margin: 25px 0; padding: 20px; background: #1a1a1a; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ Hesap Ayarları</h1>

        <div class="section">
            <h3>Discord Hesabı Bağla</h3>
            <input type="text" id="discordToken" placeholder="Discord Token (.linkaccount ile alın)">
            <button onclick="linkDiscord()">Discord Bağla</button>
        </div>

        <div class="section">
            <h3>Steam ID Bağla (Oyun İçi)</h3>
            <p>Oyun içinde <code>.linkaccount <email> <password></code> komutunu kullanarak Steam ID'nizi bağlayabilirsiniz.</p>
        </div>

        <div class="section">
            <h3>Şifre Değiştir</h3>
            <input type="password" id="newPassword" placeholder="Yeni Şifre">
            <button onclick="changePassword()">Şifreyi Değiştir</button>
        </div>

        <div class="section">
            <h3>E-posta Değiştir</h3>
            <input type="email" id="newEmail" placeholder="Yeni E-posta">
            <button onclick="changeEmail()">E-postayı Değiştir</button>
        </div>

        <p><a href="sendcommandwiacedmod.html">← Komut Paneli</a></p>
    </div>

    <script src="supabase.js"></script>
    <script src="app.js"></script>

    <script>
        function linkDiscord() {
            const token = document.getElementById('discordToken').value.trim();
            if (!token) return alert("Token girin!");
            alert("Discord bağlandı! (Simüle)");
            localStorage.setItem('discord_linked', 'true');
        }

        function changePassword() {
            const pass = document.getElementById('newPassword').value.trim();
            if (!pass) return alert("Yeni şifre girin!");
            alert("Şifre değiştirildi.");
        }

        function changeEmail() {
            const email = document.getElementById('newEmail').value.trim();
            if (!email) return alert("Yeni e-posta girin!");
            alert("E-posta değiştirildi.");
        }
    </script>
</body>
</html>
