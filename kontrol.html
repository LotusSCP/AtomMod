<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AtomMod - Sunucu Kontrol</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-panel { 
            background: #111; 
            border: 2px solid #0f0; 
            border-radius: 10px; 
            padding: 25px; 
            margin: 20px 0; 
        }
        .result { 
            margin-top: 15px; 
            padding: 15px; 
            border-radius: 8px; 
            min-height: 70px; 
            font-weight: bold; 
            white-space: pre-wrap;
        }
        select, input { 
            width: 100%; 
            padding: 12px; 
            margin: 8px 0; 
            background: #222; 
            color: white; 
            border: 1px solid #444; 
            border-radius: 6px; 
            font-size: 16px;
        }
        button { 
            width: 100%; 
            padding: 14px; 
            font-size: 18px; 
            background: #0f0; 
            color: black; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            margin-top: 15px;
        }
        button:hover { background: #0c0; }
    </style>
</head>
<body>
    <main>
        <h1>🛠 Sunucu Kontrol Paneli</h1>
        <p id="permissionInfo" style="text-align: center; font-size: 18px; font-weight: bold;"></p>

        <div class="admin-panel">
            <label>Komut Türü:</label>
            <select id="commandSelect">
                <option value="broadcast">Broadcast Mesajı</option>
                <option value="bc">Kısa Broadcast (bc)</option>
                <option value="roundrestart">Round Restart</option>
                <option value="cassie">Cassie Mesajı</option>
                <option value="nuke">Nuke Başlat</option>
                <option value="stopnuke">Nuke Durdur</option>
                <option value="kick">Oyuncu Kick</option>
            </select>

            <label>Argümanlar:</label>
            <input type="text" id="commandArgs" placeholder="Örn: Hoş geldiniz oyuncular!">

            <button id="sendCommandBtn">🚀 Komutu Gönder</button>
            
            <div id="commandResult" class="result"></div>
        </div>

        <p style="text-align:center;">
            <a href="index.html">← Ana Sayfa</a>
        </p>
    </main>

    <script src="supabase.js"></script>
    <script src="app.js"></script>

    <script>
        // Permission Kontrolü
        async function getCurrentUserPermission() {
            try {
                if (window.supabaseUtils && typeof window.supabaseUtils.getUserPermission === 'function') {
                    return await window.supabaseUtils.getUserPermission(
                        window.atommodApp.defaultSupabaseUrl,
                        window.atommodApp.defaultSupabaseAnon
                    );
                }
                // Fallback
                return Number(sessionStorage.getItem('atommod_permission') || 0);
            } catch (err) {
                console.error("Permission alınamadı:", err);
                return 0;
            }
        }

        // Sayfa Yüklendiğinde
        window.addEventListener('load', async () => {
            const permission = await getCurrentUserPermission();
            const infoEl = document.getElementById('permissionInfo');
            const resultEl = document.getElementById('commandResult');

            if (permission >= 5) {
                infoEl.style.color = 'lime';
                infoEl.textContent = `✅ Yetkiniz: ${permission} - Komut gönderme aktif`;
            } else {
                infoEl.style.color = 'red';
                infoEl.textContent = `❌ Yetkiniz yetersiz (${permission}). Bu sayfayı kullanamazsınız.`;
                document.getElementById('sendCommandBtn').disabled = true;
                return;
            }

            // Komut Gönderme
            document.getElementById('sendCommandBtn').addEventListener('click', async () => {
                const cmd = document.getElementById('commandSelect').value;
                const args = document.getElementById('commandArgs').value.trim();
                const resultEl = document.getElementById('commandResult');

                resultEl.style.background = '#333';
                resultEl.style.color = '#ff0';
                resultEl.textContent = '⏳ Komut gönderiliyor...';

                const res = await window.sendServerCommand(cmd, args);

                if (res.ok) {
                    resultEl.style.background = '#004d00';
                    resultEl.style.color = '#0f0';
                    resultEl.textContent = `✅ ${res.message}`;
                } else {
                    resultEl.style.background = '#4d0000';
                    resultEl.style.color = '#ff6666';
                    resultEl.textContent = `❌ ${res.message}`;
                }
            });
        });
    </script>
</body>
</html>
