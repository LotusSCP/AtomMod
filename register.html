<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AtomMod - Kayıt Ol</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <h1>Kayıt Ol</h1>
        <form id="registerForm">
            <label>Kullanıcı adı:<br><input type="text" id="username" required></label>
            <label>Şifre:<br><input type="password" id="password" minlength="6" required></label>
            <button type="submit" id="submitBtn">Kaydol</button>
        </form>
        <div id="result"></div>
        <p><a href="index.html">Ana Sayfa</a> | <a href="login.html">Giriş Yap</a></p>
    </main>

    <script src="supabase.js"></script>
    <script src="app.js"></script>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const resEl = document.getElementById('result');
            const btn = document.getElementById('submitBtn');

            btn.disabled = true;
            resEl.innerHTML = 'Kayıt yapılıyor...';

            try {
                const result = await window.supabaseUtils.signUp(
                    window.atommodApp.defaultSupabaseUrl,
                    window.atommodApp.defaultSupabaseAnon,
                    username,
                    password
                );

                if (result && result.ok) {
                    resEl.innerHTML = `✅ <b>Kayıt başarılı!</b><br>Hesap oluşturuldu: ${username}`;
                    setTimeout(() => window.location.href = 'login.html', 1500);
                } else {
                    resEl.innerHTML = `❌ Kayıt başarısız: ${result?.error?.message || 'Bilinmeyen hata'}`;
                }
            } catch (err) {
                console.error(err);
                resEl.innerHTML = `❌ Hata: ${err.message}`;
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
