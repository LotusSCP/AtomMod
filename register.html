<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AtomMod - Kayıt Ol</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <h1>Kayıt Ol</h1>
        <form id="registerForm">
            <label>Kullanıcı adı / E-posta:<br><input type="text" id="username" placeholder="ornek@email.com" required></label>
            <label>Şifre:<br><input type="password" id="password" minlength="6" required></label>
            <label><input type="checkbox" id="useSupabaseAuth" checked> Supabase Auth ile kayıt ol</label>
            <button type="submit" id="submitBtn">Kaydol</button>
        </form>
        <div id="result"></div>
        <p><a href="index.html">Ana Sayfa</a> | <a href="login.html">Giriş Yap</a></p>
    </main>

    <script src="supabase.js"></script>
    <script src="app.js"></script>

    <script>
        const baseUrl = 'http://localhost:5001';

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const useSupabase = document.getElementById('useSupabaseAuth').checked;
            const resEl = document.getElementById('result');
            const btn = document.getElementById('submitBtn');

            btn.disabled = true;
            resEl.textContent = 'Kayıt yapılıyor...';

            try {
                if (useSupabase) {
                    const SUPABASE_URL = window.atommodApp.defaultSupabaseUrl;
                    const SUPABASE_ANON = window.atommodApp.defaultSupabaseAnon;

                    const result = await window.supabaseUtils.signUp(SUPABASE_URL, SUPABASE_ANON, username, password);

                    if (result.ok) {
                        resEl.innerHTML = `✅ <b>Kayıt başarılı!</b><br>Hesap oluşturuldu: ${username}`;
                    } else {
                        resEl.textContent = `❌ Kayıt başarısız: ${result.error?.message || 'Bilinmeyen hata'}`;
                    }
                } else {
                    // Backend ile kayıt
                    const res = await fetch(baseUrl + '/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });
                    const data = await res.json();
                    resEl.textContent = res.ok ? '✅ Kayıt başarılı!' : `❌ Hata: ${data.error}`;
                }
            } catch (err) {
                resEl.textContent = `❌ Hata: ${err.message}`;
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
