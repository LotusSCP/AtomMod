<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AtomMod - Kayıt Ol</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <h1>Kayıt Ol</h1>
        <form id="registerForm">
            <label>
                Kullanıcı adı / E-posta:<br>
                <input type="text" id="username" placeholder="ornek@email.com" required>
            </label>

            <label>
                Şifre:<br>
                <input type="password" id="password" minlength="6" required>
            </label>

            <label>
                <input type="checkbox" id="useSupabaseAuth" checked>
                Supabase Auth ile kayıt ol (önerilen)
            </label>

            <button type="submit" id="submitBtn">Kaydol</button>
        </form>

        <div id="result"></div>

        <p><a href="index.html">Ana Sayfa</a> | <a href="login.html">Giriş Yap</a></p>
    </main>

    <!-- Supabase Utils -->
    <script src="supabase.js"></script>

    <script>
        const baseUrl = 'http://localhost:5001';   // Backend URL'ini buradan değiştir

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const useSupabase = document.getElementById('useSupabaseAuth').checked;
            const resEl = document.getElementById('result');
            const submitBtn = document.getElementById('submitBtn');

            if (!username || !password) {
                resEl.textContent = '❌ Kullanıcı adı ve şifre boş olamaz!';
                return;
            }

            if (password.length < 6) {
                resEl.textContent = '❌ Şifre en az 6 karakter olmalıdır!';
                return;
            }

            submitBtn.disabled = true;
            resEl.textContent = 'Kayıt yapılıyor, lütfen bekleyin...';

            try {
                if (useSupabase) {
                    // === SUPABASE AUTH İLE KAYIT ===
                    if (!window.supabaseUtils || typeof window.supabaseUtils.signUp !== 'function') {
                        throw new Error('supabase.js yüklenemedi. Dosyayı kontrol edin.');
                    }

                    const SUPABASE_URL = prompt('Supabase Project URL girin[](https://xyz.supabase.co)', '') || '';
                    const SUPABASE_ANON_KEY = prompt('Supabase Anon Key girin', '') || '';

                    if (!SUPABASE_URL || !SUPABASE_ANON_KEY) {
                        throw new Error('Supabase URL veya Anon Key girilmedi.');
                    }

                    const result = await window.supabaseUtils.signUp(SUPABASE_URL, SUPABASE_ANON_KEY, u, p);

                    if (result.ok) {
                        resEl.textContent = '✅ Kayıt başarılı! Lütfen e-posta onayı yapın.';
                    } else {
                        const errMsg = result.error?.message || 'Bilinmeyen hata';
                        resEl.textContent = '❌ Kayıt başarısız: ' + errMsg;
                    }
                }
                else {
                    // === BACKEND'E POST AT (eski sistem) ===
                    const res = await fetch(baseUrl + '/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: username, password: password })
                    });

                    const data = await res.json();

                    if (res.ok) {
                        resEl.textContent = '✅ Kayıt başarılı. Artık giriş yapabilirsiniz.';
                    } else {
                        resEl.textContent = `❌ Hata: ${data.error || data.message || JSON.stringify(data)}`;
                    }
                }
            } catch (err) {
                console.error(err);
                resEl.textContent = `❌ Bir hata oluştu: ${err.message}`;
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
