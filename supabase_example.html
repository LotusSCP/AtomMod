<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Supabase Example - AtomMod</title>
</head>
<body>
  <h1>Supabase Example (read-only)</h1>
  <p>This example fetches top players from Supabase using anon key (read-only).</p>
  <pre>
    // Replace these with your supabase project settings
    const SUPABASE_URL = 'https://your-project.supabase.co';
    const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';
  </pre>
  <button id="load">Load top players</button>
  <div id="out">-</div>

  <script src="supabase.js"></script>
  <script>
    document.getElementById('load').addEventListener('click', async () => {
      const SUPABASE_URL = prompt('Supabase URL (e.g. https://xyz.supabase.co)');
      const SUPABASE_ANON_KEY = prompt('Supabase anon key');
      if (!SUPABASE_URL || !SUPABASE_ANON_KEY) return alert('Missing');
      try {
        const data = await window.supabaseUtils.fetchPlayerStats(SUPABASE_URL, SUPABASE_ANON_KEY, 20);
        document.getElementById('out').textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        document.getElementById('out').textContent = 'Error: ' + e.message;
      }
    });
  </script>
</body>
</html>
