<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AtomMod - Sunucu Durumu</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <h1>Sunucu Durumu</h1>

        <div id="serverInfo">
            <p><strong>Sunucu:</strong> <span id="serverStatus">Yükleniyor...</span></p>
            <p><strong>Online Oyuncu:</strong> <span id="playerCount">0</span></p>
        </div>

        <h2>Online Oyuncular</h2>
        <div id="players"></div>

        <button id="refresh">Yenile</button>
        <p><a href="index.html">Ana Sayfa</a></p>
    </main>

    <script src="supabase.js"></script>
    <script src="app.js"></script>

    <script>
        const baseUrl = 'http://localhost:5001';

        async function loadStatus() {
            const statusEl = document.getElementById('serverStatus');
            const countEl = document.getElementById('playerCount');
            const playersEl = document.getElementById('players');

            statusEl.textContent = 'Yükleniyor...';
            playersEl.innerHTML = '';

            try {
                // 1. Supabase'den player_stats çek
                const SUPABASE_URL = window.atommodApp?.defaultSupabaseUrl || sessionStorage.getItem('atommod_supabase_url');
                const SUPABASE_ANON = window.atommodApp?.defaultSupabaseAnon || sessionStorage.getItem('atommod_supabase_anon');

                if (SUPABASE_URL && SUPABASE_ANON) {
                    const data = await window.supabaseUtils.fetchPlayerStats(SUPABASE_URL, SUPABASE_ANON, 50);

                    countEl.textContent = data.length;
                    statusEl.innerHTML = '✅ <span style="color:#0f0">Sunucu Açık</span>';

                    if (data.length > 0) {
                        playersEl.innerHTML = '<strong>Online Oyuncular:</strong><br>' +
                            data.map(p => `• ${p.nickname} (${p.total_play_seconds || 0}s)`).join('<br>');
                    } else {
                        playersEl.textContent = 'Şu anda kimse online değil.';
                    }
                } else {
                    // Fallback: Plugin'den çek
                    const res = await fetch(baseUrl + '/status');
                    const pdata = await res.json();
                    countEl.textContent = pdata.count;
                    statusEl.innerHTML = '✅ <span style="color:#0f0">Sunucu Açık</span>';
                    playersEl.innerHTML = '<strong>Online:</strong><br>' + pdata.players.map(p => `• ${p}`).join('<br>');
                }
            } catch (err) {
                console.error(err);
                statusEl.innerHTML = '❌ <span style="color:#f00">Sunucuya ulaşılamadı</span>';
                countEl.textContent = '0';
                playersEl.textContent = 'Bağlantı hatası.';
            }
        }

        document.getElementById('refresh').addEventListener('click', loadStatus);
        window.addEventListener('load', loadStatus);
    </script>
</body>
</html>
