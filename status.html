<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AtomMod - Sunucu Durumu</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <h1>Sunucu Durumu</h1>

        <div id="serverInfo">
            <p><strong>Sunucu IP:</strong> <span id="serverIp">Yükleniyor...</span></p>
            <p><strong>Sunucu No:</strong> <span id="serverNumber">-</span></p>
            <p><strong>Online Oyuncu:</strong> <span id="playerCount">0</span></p>
        </div>

        <h2>Online Oyuncular</h2>
        <div id="players"></div>

        <button id="refresh">Yenile</button>
        <p><a href="index.html">Ana Sayfa</a> | <a href="kontrol.html">Sunucu Kontrol</a></p>
    </main>

    <script src="supabase.js"></script>
    <script src="app.js"></script>

    <script>
        async function loadStatus() {
            const SUPABASE_URL = window.atommodApp?.defaultSupabaseUrl;
            const SUPABASE_ANON = window.atommodApp?.defaultSupabaseAnon;

            const statusEl = document.getElementById('serverIp');
            const countEl = document.getElementById('playerCount');
            const playersEl = document.getElementById('players');

            playersEl.innerHTML = 'Yükleniyor...';

            try {
                const data = await window.supabaseUtils.fetchServerStatus(SUPABASE_URL, SUPABASE_ANON);

                countEl.textContent = data.length;

                if (data.length > 0) {
                    document.getElementById('serverIp').textContent = data[0].server_ip || 'Bilinmiyor';
                    document.getElementById('serverNumber').textContent = data[0].server_number || '1';
                }

                let html = '<strong>Online Oyuncular:</strong><br>';
                data.forEach(p => {
                    html += `• ${p.nickname} (${p.total_play_seconds || 0}s)<br>`;
                });

                playersEl.innerHTML = html || 'Şu anda kimse online değil.';

            } catch (err) {
                console.error(err);
                playersEl.innerHTML = `Hata: ${err.message}`;
            }
        }

        document.getElementById('refresh').addEventListener('click', loadStatus);
        window.addEventListener('load', loadStatus);
    </script>
</body>
</html>
