<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sunucu Durumu - AtomMod</title>
    <style>
        :root { --primary: #00ff41; --bg: #0a0a0a; --card: #111; }
        body { background: var(--bg); color: #ddd; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 20px; }
        .card {
            background: var(--card);
            border: 2px solid var(--primary);
            border-radius: 16px;
            padding: 30px;
            max-width: 900px;
            margin: 30px auto;
        }
        h1 { text-align: center; color: var(--primary); }
        .info { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 25px 0; }
        .info p { margin: 8px 0; }
        .players { margin-top: 30px; }
        .player-item {
            background: #1a1a1a;
            padding: 12px 16px;
            margin: 6px 0;
            border-radius: 8px;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #0f0;
            color: black;
            border: none;
            border-radius: 8px;
            font-size: 17px;
            cursor: pointer;
        }
        button:hover { background: #0c0; }
    </style>
</head>
<body>
    <div class="card">
        <h1>📊 Sunucu Durumu</h1>

        <div class="info">
            <p><strong>Sunucu IP:</strong> <span id="serverIp">Yükleniyor...</span></p>
            <p><strong>Online Oyuncu:</strong> <span id="playerCount">0</span></p>
        </div>

        <div class="players">
            <h3>Online Oyuncular</h3>
            <div id="playersList">Yükleniyor...</div>
        </div>

        <button id="refresh">Yenile</button>
    </div>

    <script src="app.js"></script>
    <script>
        async function loadStatus() {
            try {
                const configRes = await fetch('https://lotusscp.github.io/atommodapi/config.json');
                const CONFIG = await configRes.json();

                const res = await fetch(`${CONFIG.saganetwork.panel_url}/api/client/servers/${CONFIG.saganetwork.server_id}`, {
                    headers: { 'Authorization': `Bearer ${CONFIG.saganetwork.api_key}` }
                });

                const data = await res.json();

                document.getElementById('serverIp').textContent = data.attributes?.ip || 'Bilinmiyor';
                document.getElementById('playerCount').textContent = data.attributes?.player_count || 0;

                document.getElementById('playersList').innerHTML = `<p style="color:#0f0">Şu anda <strong>${data.attributes?.player_count || 0}</strong> oyuncu oyunda.</p>`;

            } catch (err) {
                document.getElementById('playersList').innerHTML = `<p style="color:#ff6666">Sunucu durumu alınamadı.</p>`;
            }
        }

        document.getElementById('refresh').addEventListener('click', loadStatus);
        window.addEventListener('load', loadStatus);
    </script>
</body>
</html>
