<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sunucu Durumu - AtomMod</title>
    <style>
        :root {
            --primary: #00ff41;
            --bg: #0a0a0a;
            --card: #111111;
        }
        body {
            background: var(--bg);
            color: #ddd;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 35px;
            background: var(--card);
            border-radius: 16px;
            border: 2px solid var(--primary);
            box-shadow: 0 10px 30px rgba(0, 255, 65, 0.1);
        }
        h1 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 30px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .info-card {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
        }
        .info-card strong {
            color: var(--primary);
            display: block;
            margin-bottom: 8px;
        }
        .players-section {
            margin-top: 40px;
        }
        .players-section h3 {
            color: var(--primary);
            margin-bottom: 15px;
        }
        .player-list {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 10px;
            min-height: 100px;
        }
        button {
            width: 100%;
            padding: 16px;
            margin-top: 25px;
            background: var(--primary);
            color: black;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background: #00cc33;
        }
        .loading {
            color: #888;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Sunucu Durumu</h1>

        <div class="info-grid">
            <div class="info-card">
                <strong>Sunucu IP</strong>
                <span id="serverIp">Yükleniyor...</span>
            </div>
            <div class="info-card">
                <strong>Online Oyuncu</strong>
                <span id="playerCount">0</span>
            </div>
        </div>

        <div class="players-section">
            <h3>🎮 Şu Anda Oyunda Olanlar</h3>
            <div id="playersList" class="player-list">Yükleniyor...</div>
        </div>

        <button id="refreshBtn">🔄 Yenile</button>
    </div>

    <script src="app.js"></script>
    <script>
        async function loadStatus() {
            const playersList = document.getElementById('playersList');
            const countEl = document.getElementById('playerCount');
            const ipEl = document.getElementById('serverIp');

            playersList.innerHTML = '<div class="loading">Sunucu bilgisi alınıyor...</div>';

            try {
                const configRes = await fetch('https://lotusscp.github.io/atommodapi/config.json');
                const CONFIG = await configRes.json();

                const res = await fetch(`${CONFIG.saganetwork.panel_url}/api/client/servers/${CONFIG.saganetwork.server_id}`, {
                    headers: {
                        'Authorization': `Bearer ${CONFIG.saganetwork.api_key}`,
                        'Accept': 'application/json'
                    }
                });

                if (!res.ok) throw new Error("Sunucu bilgisi alınamadı");

                const data = await res.json();

                // Bilgileri güncelle
                ipEl.textContent = data.attributes?.ip || 'Bilinmiyor';
                countEl.textContent = data.attributes?.player_count || 0;

                // Oyuncu listesi (Pterodactyl API sadece sayı veriyor, isim için ekstra endpoint lazım)
                playersList.innerHTML = `
                    <div style="color:#0f0; font-size:1.1em;">
                        Şu anda <strong>${data.attributes?.player_count || 0}</strong> oyuncu oyunda.
                    </div>
                    <small style="color:#888;">Gerçek oyuncu isimleri için plugin tarafında ekstra geliştirme gerekiyor.</small>
                `;

            } catch (err) {
                playersList.innerHTML = `<span style="color:#ff6666">❌ Sunucu durumu alınamadı.<br>${err.message}</span>`;
            }
        }

        // Yenile butonu
        document.getElementById('refreshBtn').addEventListener('click', loadStatus);

        // Sayfa yüklendiğinde otomatik yükle
        window.addEventListener('load', loadStatus);
    </script>
</body>
</html>
