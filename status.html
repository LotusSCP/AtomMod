<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AtomMod - Sunucu Durumu</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <h1>Sunucu Durumu</h1>
    <div id="status">Yükleniyor...</div>
    <div id="players"></div>
    <button id="refresh">Yenile</button>
    <p><a href="index.html">Ana Sayfa</a></p>
  </main>

  <script src="supabase.js"></script>
  <script>
    const baseUrl = 'http://localhost:5001';
    const defaultSupabaseUrl = '';
    const defaultSupabaseAnon = '';

    async function checkStatus() {
      const statusEl = document.getElementById('status');
      const playersEl = document.getElementById('players');
      statusEl.textContent = 'İstek gönderiliyor...';
      playersEl.textContent = '';
      try {
        // Try Supabase read first if configured
        const SUPABASE_URL = defaultSupabaseUrl || sessionStorage.getItem('atommod_supabase_url');
        const SUPABASE_ANON = defaultSupabaseAnon || sessionStorage.getItem('atommod_supabase_anon');
        if (SUPABASE_URL && SUPABASE_ANON) {
          const data = await window.supabaseUtils.fetchPlayerStats(SUPABASE_URL, SUPABASE_ANON, 50);
          statusEl.textContent = `Supabase'den ${data.length} kayıt getirildi.`;
          if (data && data.length) {
            playersEl.innerHTML = '<strong>Oyuncular (Supabase):</strong><br>' + data.map(p => escapeHtml(p.nickname) + ' — ' + (p.total_play_seconds || 0) + 's').join('<br>');
            return;
          }
        }

        // Fallback to plugin status
        const res = await fetch(baseUrl + '/status');
        if (!res.ok) throw new Error('Sunucuya ulaşılamadı: ' + res.status);
        const pdata = await res.json();
        statusEl.textContent = `Sunucuda ${pdata.count} kişi var.`;
        if (pdata.players && pdata.players.length) {
          playersEl.innerHTML = '<strong>Oyuncular:</strong><br>' + pdata.players.map(p => escapeHtml(p)).join('<br>');
        } else playersEl.textContent = 'Oyuncu bilgisi yok.';
      } catch (err) {
        statusEl.textContent = 'Hata: ' + err.message;
      }
    }

    document.getElementById('refresh').addEventListener('click', (e) => { e.preventDefault(); checkStatus(); });

    function escapeHtml(s) { return String(s).replace(/[&<>\"']/g, (c) => ({ '&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',"'":"&#39;" })[c]); }

    window.addEventListener('load', () => { checkStatus(); });
  </script>
</body>
</html>
