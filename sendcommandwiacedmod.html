<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AtomMod - Pterodactyl WS Panel</title>
    <style>
        body { background:#0a0a0a; color:#ddd; font-family:Arial; padding:20px; }
        .container { max-width:800px; margin:0 auto; background:#111; padding:30px; border-radius:12px; border:2px solid #0f0; }
        select, input { width:100%; padding:14px; margin:10px 0; background:#1e1e1e; color:white; border:1px solid #0f0; border-radius:6px; }
        button { width:100%; padding:18px; margin-top:20px; background:#0f0; color:black; border:none; border-radius:8px; font-size:19px; cursor:pointer; }
        button:hover { background:#0c0; }
        .result { margin-top:25px; padding:18px; border-radius:8px; min-height:100px; white-space:pre-wrap; }
        .success { background:#002200; color:#0f0; }
        .error { background:#220000; color:#ff6666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔌 Pterodactyl Komut Paneli</h1>
        <p id="permissionInfo" style="text-align:center; font-size:20px; margin:20px 0;"></p>

        <label>Komut Türü:</label>
        <select id="commandSelect">
            <option value="broadcast">Broadcast</option>
            <option value="roundrestart">Round Restart</option>
            <option value="cassie">Cassie</option>
            <option value="nuke">Nuke</option>
            <option value="kick">Kick</option>
        </select>

        <label>Argüman:</label>
        <input type="text" id="commandArgs" placeholder="Mesaj veya argüman...">

        <button id="sendBtn">🚀 Komutu Gönder</button>

        <div id="result" class="result"></div>
    </div>

    <script src="supabase.js"></script>
    <script src="app.js"></script>

    <script>
        let ws = null;

        async function getPermission() {
            let perm = Number(sessionStorage.getItem('atommod_permission'));
            if (!perm) perm = Number(localStorage.getItem('atommod_permission'));
            return perm || 0;
        }

        async function sendCommand(cmd, args) {
            const resultBox = document.getElementById('result');
            resultBox.className = 'result';
            resultBox.textContent = 'Komut gönderiliyor...';

            // Basit fallback - WebSocket yerine HTTP proxy denemesi
            try {
                const res = await fetch('https://panel.saganetwork.net/api/client/servers/43ef2206-a5ff-4ff8-bfd5-9ac16a5dc11e/websocket', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: cmd, args: args })
                });

                const text = await res.text();
                resultBox.className = 'result success';
                resultBox.textContent = `✅ ${text}`;
            } catch (err) {
                resultBox.className = 'result error';
                resultBox.textContent = `❌ Bağlantı hatası: ${err.message}\n\nNot: CORS sorunu devam ediyor.`;
            }
        }

        window.addEventListener('load', async () => {
            const perm = await getPermission();
            const infoEl = document.getElementById('permissionInfo');

            if (perm >= 5) {
                infoEl.style.color = '#0f0';
                infoEl.innerHTML = `✅ Yetki: <strong>${perm}</strong> — Komut gönderme aktif`;
            } else {
                infoEl.style.color = '#ff4444';
                infoEl.innerHTML = `❌ Yetki yetersiz (${perm})`;
                document.getElementById('sendBtn').disabled = true;
                return;
            }

            document.getElementById('sendBtn').addEventListener('click', () => {
                const cmd = document.getElementById('commandSelect').value;
                const args = document.getElementById('commandArgs').value.trim();
                sendCommand(cmd, args);
            });
        });
    </script>
</body>
</html>
