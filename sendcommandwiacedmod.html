<script type="text/javascript">
    window.setErrorText = function(message) {
        var elem = document.getElementById('blazor-error-ui');
        elem.innerHTML = message;
    };
    
    document.addEventListener('DOMContentLoaded', (event) => {
        try {
            if (localStorage.getItem("versionData") === null) {
                localStorage.setItem("versionData", new Date().getTime())
            }

            const data = localStorage.getItem("versionData");
            let loadedCount = 0;
            const resourcesToLoad = [];
            Blazor.start({
                loadBootResource: function (type, name, defaultUri, integrity) {
                    console.log(`Loading: '${type}', '${name}', '${defaultUri}', '${integrity}'`);

                    if (type == "dotnetjs")
                        return `https://assets.cedmod.nl/_framework/${name}?t=${data}&i=${integrity}`;

                    const fetchResources = fetch(`https://assets.cedmod.nl/_framework/${name}?t=${data}&i=${integrity}`, {
                        cache: 'default',
                        integrity: integrity,
                    });

                    resourcesToLoad.push(fetchResources);

                    fetchResources.then((r) => {
                        console.log(`Handling load ${name}`)
                        loadedCount += 1;
                        if (name == "blazor.boot.json")
                            return;
                        const totalCount = resourcesToLoad.length;
                        
                        const progressLabel = document.getElementById('progressLabel');
                        progressLabel.innerText = `Downloading ${loadedCount}/${totalCount}: ${name}`;
                        
                        if (loadedCount === totalCount) {
                            progressLabel.innerText = `Bootstrapping`;   
                        }
                    });
                    
                    return fetchResources;
                }
            }).catch(error => {
                console.log(error)
                localStorage.setItem("versionData", new Date().getTime())
                if (localStorage.getItem("errored") !== null) {
                    alert(`error during CedMod Bootstrapping, page will reload, contact cedmod support and refresh cache if this persists ${error}`)
                }
                localStorage.setItem("errored", '1')
            });
        } catch (error) {
            console.log(error)
            localStorage.setItem("versionData", new Date().getTime())
            if (localStorage.getItem("errored") !== null) {
                alert(`error during CedMod Bootstrapping, page will reload, contact cedmod support and refresh cache if this persists ${error}`)
            }
            localStorage.setItem("errored", '1')
        }
    })
    
    window.getDimensions = function() {
        return {
            width: window.innerWidth,
            height: window.innerHeight
        };
    };

    window.openUrl = function(url) {
        window.open(url, 'troll', 'height=480,width=640', false);
    };

    window.openUrl2 = function(url) {
        window.open(url, "_blank");
    };

    window.clipboardCopy = function (codeElement) {
        navigator.clipboard.writeText(codeElement).then(function () {

        })
            .catch(function (error) {
                alert(error);
            });
    }

    document.addEventListener("visibilitychange", function() {
        DotNet.invokeMethodAsync('Panel', 'OnMouseEvent', document.visibilityState === 'visible')
    });
    
   
    window.isActive = function () {
        return !document.hidden
    }

    window.fetchOffset = function () {
        return new Date().getTimezoneOffset();
    }
    
    window.isVisible = function(name) {
        var element =  document.getElementById(name);
        if (typeof(element) != 'undefined' && element != null) {
            return true;
        }
        
        return false;
    }

    function isDevice() {
        return /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini|mobile/i.test(navigator.userAgent);
    }
</script>
