<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AtomMod - CedMod Komut Paneli</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background: #0f0f0f;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: #1a1a1a;
            padding: 40px;
            border-radius: 15px;
            border: 3px solid #0f0;
        }
        h1 { color: #0f0; margin-bottom: 10px; }
        .permission {
            font-size: 20px;
            margin: 20px 0;
            padding: 10px;
            background: #004d00;
            border-radius: 8px;
        }
        button {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 20px;
            background: #0f0;
            color: black;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        button:hover {
            background: #0c0;
        }
        .note {
            margin-top: 40px;
            color: #aaa;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛠 AtomMod - CedMod Komut Paneli</h1>
        
        <div class="permission" id="permissionInfo">
            Yetki seviyesiniz yükleniyor...
        </div>

        <p style="font-size:18px; margin:25px 0;">
            CedMod'un resmi paneline yönlendirileceksiniz.<br>
            Oradan tüm komutları (broadcast, kick, ban, roundrestart vb.) gönderebilirsiniz.
        </p>

        <button onclick="goToCedModPanel()">🚀 CedMod Paneline Git</button>

        <div class="note">
            Not: CedMod panelinde kendi hesabınızla giriş yapmanız gerekebilir.
        </div>

        <p style="margin-top:40px;">
            <a href="index.html" style="color:#0f0; text-decoration:none;">← Ana Sayfaya Dön</a>
        </p>
    </div>

    <script src="supabase.js"></script>
    <script src="app.js"></script>

    <script>
        async function getCurrentUserPermission() {
            try {
                return await window.supabaseUtils.getUserPermission(
                    window.atommodApp.defaultSupabaseUrl,
                    window.atommodApp.defaultSupabaseAnon
                );
            } catch (e) {
                return Number(sessionStorage.getItem('atommod_permission') || 0);
            }
        }

        async function goToCedModPanel() {
            const permission = await getCurrentUserPermission();
            
            if (permission < 5) {
                alert("❌ Bu sayfayı kullanmak için yetkiniz yetersiz!\nYetki: " + permission);
                return;
            }

            // CedMod'un kendi panel linki (senin verdiğin)
            window.open("https://flamescp.cmod.app", "_blank");
        }

        // Sayfa yüklendiğinde yetki göster
        window.addEventListener('load', async () => {
            const permission = await getCurrentUserPermission();
            const infoEl = document.getElementById('permissionInfo');
            
            infoEl.textContent = `✅ Yetki seviyeniz: ${permission}`;
            
            if (permission < 5) {
                infoEl.style.background = '#4d0000';
                infoEl.style.color = '#ff6666';
            }
        });
    </script>
</body>
</html>
