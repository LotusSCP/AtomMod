<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AtomMod - CedMod Panel</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
        }
        .header {
            background: #0f0;
            color: black;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }
        iframe {
            width: 100%;
            height: calc(100vh - 60px);
            border: none;
        }
        .info {
            padding: 10px;
            text-align: center;
            background: #1a1a1a;
        }
    </style>
</head>
<body>
    <div class="header">
        AtomMod - CedMod Komut Paneli
    </div>
    
    <div class="info">
        <strong>Not:</strong> Aşağıdaki panel CedMod'un kendi resmi panelidir. 
        Buradan tüm komutları (broadcast, kick, ban, roundrestart vb.) gönderebilirsiniz.
    </div>

    <!-- CedMod Resmi Paneli iframe ile gömülüyor -->
    <iframe id="cedmodFrame" 
            src="https://cedmod.nl" 
            allowfullscreen>
    </iframe>

    <script src="supabase.js"></script>
    <script src="app.js"></script>

    <script>
        window.addEventListener('load', async () => {
            const permission = await getCurrentUserPermission();

            if (permission < 5) {
                alert("❌ Bu sayfayı kullanmak için yetkiniz yetersiz!\n\nYetki seviyesiniz: " + permission);
                window.location.href = "index.html";
                return;
            }

            console.log("✅ CedMod Panel yüklendi - Yetki:", permission);
        });

        // Basit permission kontrolü
        async function getCurrentUserPermission() {
            try {
                return await window.supabaseUtils.getUserPermission(
                    window.atommodApp.defaultSupabaseUrl,
                    window.atommodApp.defaultSupabaseAnon
                );
            } catch (e) {
                return Number(sessionStorage.getItem('atommod_permission') || 0);
            }
        }
    </script>
</body>
</html>
