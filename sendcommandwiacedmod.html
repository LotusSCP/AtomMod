<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SCPSL Komut Paneli</title>
    <style>
        body { font-family: Arial; background: #1e1e1e; color: #fff; padding: 20px; }
        input, button { padding: 10px; font-size: 16px; margin: 5px; }
        button { background: #0066ff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0055dd; }
        #sonuc { margin-top: 20px; white-space: pre-wrap; background: #333; padding: 15px; border-radius: 5px; }
    </style>
</head>
<body>
    <h2>SCPSL Sunucu Komut Paneli</h2>
    
    <input type="text" id="komut" placeholder="broadcast Merhaba Dünya" style="width: 400px;">
    <button onclick="gonderKomut()">Komut Gönder</button>

    <div id="sonuc"></div>

    <script>
        const API_KEY = "cok_gizli_sifren_2026";   // ← Plugin'deki ApiKey ile AYNI olsun!
        const HOST = "atommod.mcsunucun.com";
        const PORT = 29076;

        async function gonderKomut() {
            const cmdInput = document.getElementById("komut").value.trim();
            const sonucDiv = document.getElementById("sonuc");

            if (!cmdInput) {
                sonucDiv.innerHTML = "<span style='color:red'>Komut boş olamaz!</span>";
                return;
            }

            const encodedCmd = encodeURIComponent(cmdInput);
            const url = `http://${HOST}:${PORT}/command/?key=${API_KEY}&cmd=${encodedCmd}`;

            sonucDiv.innerHTML = "Gönderiliyor...";

            try {
                const response = await fetch(url, { 
                    method: "GET",
                    mode: "cors"   // Hosting izin verirse
                });

                const text = await response.text();

                if (response.ok) {
                    sonucDiv.innerHTML = `<span style='color:lime'>✅ Başarılı!</span><br><br>${text.replace(/\n/g, '<br>')}`;
                } else {
                    sonucDiv.innerHTML = `<span style='color:red'>❌ Hata (${response.status}):</span><br>${text}`;
                }
            } catch (err) {
                sonucDiv.innerHTML = `<span style='color:red'>❌ Bağlantı hatası:</span><br>${err.message}<br><br><small>Sunucu IP/port kapalı olabilir veya firewall engelliyor.</small>`;
            }
        }

        // Enter tuşu ile de gönderebilmek için
        document.getElementById("komut").addEventListener("keypress", function(e) {
            if (e.key === "Enter") gonderKomut();
        });
    </script>
</body>
</html>
