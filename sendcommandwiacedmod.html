<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AtomMod - Uzaktan Komut</title>
    <style>
        body { background: #0a0a0a; color: #ddd; font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 40px auto; padding: 30px; background: #111; border-radius: 12px; border: 2px solid #0f0; }
        label { display: block; margin: 15px 0 8px; font-weight: bold; color: #0f0; }
        select, input { width: 100%; padding: 14px; background: #1e1e1e; color: white; border: 1px solid #0f0; border-radius: 6px; font-size: 16px; }
        button { width: 100%; padding: 18px; margin-top: 25px; background: #0f0; color: black; border: none; border-radius: 8px; font-size: 19px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0c0; }
        .result { margin-top: 25px; padding: 18px; border-radius: 8px; min-height: 100px; white-space: pre-wrap; }
        .success { background: #002200; color: #0f0; }
        .error { background: #220000; color: #ff6666; }
    </style>
</head>
<body>
    <div class="container">
    <h1>🔧 AtomMod Uzaktan Komut Paneli</h1>
    <p id="permissionInfo" style="text-align:center; font-size:20px; margin:20px 0;"></p>

    <label>Komut:</label>
    <input type="text" id="commandArgs" placeholder="Örn: broadcast Merhaba, roundrestart, cassie Mesaj..." style="width: 100%; padding: 14px; font-size: 16px;" autofocus>

    <button id="sendBtn">🚀 Komutu Gönder</button>

    <div id="result" class="result"></div>
</div>
    
    <script src="supabase.js"></script>
    <script src="app.js"></script>

    <script>
        async function getPermission() {
            return Number(sessionStorage.getItem('atommod_permission') || localStorage.getItem('atommod_permission') || 0);
        }

        window.addEventListener('load', async () => {
            const perm = await getPermission();
            const infoEl = document.getElementById('permissionInfo');

            if (perm >= 5) {
                infoEl.style.color = '#0f0';
                infoEl.innerHTML = `✅ Yetki: <strong>${perm}</strong> — TCP Komut aktif`;
            } else {
                infoEl.style.color = '#ff4444';
                infoEl.innerHTML = `❌ Yetki yetersiz (${perm})`;
                document.getElementById('sendBtn').disabled = true;
                return;
            }

<script>
    document.getElementById('sendBtn').addEventListener('click', async () => {
        let fullCommand = document.getElementById('commandArgs').value.trim();

        if (!fullCommand) {
            alert("Lütfen bir komut yazın!");
            return;
        }

        const resultBox = document.getElementById('result');
        resultBox.className = 'result';
        resultBox.innerHTML = '🔄 Komut gönderiliyor...';

        const PANEL_URL = "https://panel.saganetwork.net";
        const SERVER_ID = "43ef2206-a5ff-4ff8-bfd5-9ac16a5dc11e";
        const API_KEY   = "ptlc_YsIfuDZimR2TLQcXqjfVnxtLmBuNTlmHcqYXE5TTtI9";

        try {
            const res = await fetch(`${PANEL_URL}/api/client/servers/${SERVER_ID}/command`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${API_KEY}`,
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify({ command: fullCommand })
            });

            if (res.ok || res.status === 204) {
                resultBox.className = 'result success';
                resultBox.innerHTML = `
                    ✅ <strong>Komut başarıyla gönderildi!</strong><br><br>
                    <strong>Gönderilen Komut:</strong><br>
                    <code>${fullCommand}</code><br><br>
                    <strong>Konsol Log:</strong><br>
                    Komut Pterodactyl API tarafından kabul edildi.<br>
                    Detaylı sonucu sunucu konsolundan kontrol edebilirsiniz.
                `;
            } else {
                const errorText = await res.text().catch(() => "Bilinmeyen hata");
                resultBox.className = 'result error';
                resultBox.innerHTML = `
                    ❌ <strong>Hata (${res.status})</strong><br><br>
                    Komut: <code>${fullCommand}</code><br>
                    ${errorText || "Sunucu tarafında hata oluştu."}
                `;
            }
        } catch (err) {
            resultBox.className = 'result error';
            resultBox.innerHTML = `
                ❌ <strong>Bağlantı Hatası</strong><br><br>
                ${err.message}<br><br>
                .exe dosyasını yönetici olarak çalıştırdığınızdan emin olun.
            `;
        }
    });

    // Enter tuşu ile gönderme
    document.getElementById('commandArgs').addEventListener('keypress', function(e) {
        if (e.key === "Enter") {
            document.getElementById('sendBtn').click();
        }
    });
</script>
</body>
</html>
