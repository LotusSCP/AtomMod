<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AtomMod - CedMod Komut Paneli</title>
    
    <!-- CedMod Stilleri -->
    <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
    <link href="https://assets.cedmod.nl/_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link href="https://assets.cedmod.nl/_content/CodeBeam.MudBlazor.Extensions/MudExtensions.min.css" rel="stylesheet" />

    <style>
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 0;
        }
        .header {
            background: linear-gradient(90deg, #0f0, #006600);
            color: black;
            padding: 20px;
            text-align: center;
            font-size: 26px;
            font-weight: 500;
        }
        .container {
            max-width: 850px;
            margin: 30px auto;
            padding: 30px;
            background: #121212;
            border-radius: 12px;
            border: 1px solid #0f0;
        }
        label {
            display: block;
            margin: 15px 0 6px;
            font-weight: 500;
            color: #0f0;
        }
        select, input {
            width: 100%;
            padding: 14px;
            background: #1e1e1e;
            color: white;
            border: 1px solid #0f0;
            border-radius: 6px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 16px;
            margin-top: 25px;
            background: #0f0;
            color: black;
            border: none;
            border-radius: 8px;
            font-size: 19px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background: #0c0;
        }
        .result {
            margin-top: 25px;
            padding: 18px;
            border-radius: 8px;
            min-height: 90px;
            font-size: 16px;
            white-space: pre-wrap;
        }
        .success { background: #002200; color: #0f0; }
        .error { background: #220000; color: #ff6666; }
    </style>
</head>
<body>
    <div class="header">AtomMod × CedMod Komut Paneli</div>

    <div class="container">
        <p id="permissionInfo" style="text-align:center; font-size: 20px; margin-bottom: 25px; font-weight: 500;"></p>

        <label>Komut Türü:</label>
        <select id="commandSelect">
            <option value="broadcast">Broadcast Mesajı</option>
            <option value="bc">Kısa Broadcast (bc)</option>
            <option value="roundrestart">Round Restart</option>
            <option value="cassie">Cassie Mesajı</option>
            <option value="nuke">Nuke Başlat</option>
            <option value="stopnuke">Nuke Durdur</option>
            <option value="kick">Kick Oyuncu</option>
        </select>

        <label>Argüman / Mesaj:</label>
        <input type="text" id="commandArgs" placeholder="Mesajınızı veya komut argümanını buraya yazın...">

        <button id="sendBtn">🚀 Komutu Gönder</button>

        <div id="result" class="result"></div>
    </div>

    <!-- CedMod Script'leri -->
    <script src="https://assets.cedmod.nl/_framework/blazor.webassembly.js" autostart="false"></script>
    <script src="https://assets.cedmod.nl/_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="https://assets.cedmod.nl/_content/Blazor-ApexCharts/js/apex-charts.min.js"></script>
    <script src="https://assets.cedmod.nl/_content/Blazor-ApexCharts/js/blazor-apex-charts.js"></script>
    <script src="https://assets.cedmod.nl/_content/CodeBeam.MudBlazor.Extensions/MudExtensions.min.js"></script>
    <script src="https://assets.cedmod.nl/tkLogs.js?p=1"></script>

    <script src="supabase.js"></script>
    <script src="app.js"></script>

    <script>
        async function getPermission() {
            try {
                return await window.supabaseUtils.getUserPermission(
                    window.atommodApp.defaultSupabaseUrl,
                    window.atommodApp.defaultSupabaseAnon
                );
            } catch (e) {
                return Number(sessionStorage.getItem('atommod_permission') || localStorage.getItem('atommod_permission') || 0);
            }
        }

        window.addEventListener('load', async () => {
            const perm = await getPermission();
            const infoEl = document.getElementById('permissionInfo');

            if (perm >= 5) {
                infoEl.innerHTML = `✅ Yetki: <strong>${perm}</strong> — Komut gönderme aktif`;
            } else {
                infoEl.innerHTML = `❌ Yetki yetersiz (${perm})`;
                document.getElementById('sendBtn').disabled = true;
                return;
            }

            document.getElementById('sendBtn').addEventListener('click', async () => {
                const cmd = document.getElementById('commandSelect').value;
                const args = document.getElementById('commandArgs').value.trim();
                const resultBox = document.getElementById('result');

                resultBox.className = 'result';
                resultBox.textContent = 'Komut CedMod üzerinden gönderiliyor...';

                const res = await window.sendServerCommand(cmd, args);

                if (res.ok) {
                    resultBox.className = 'result success';
                    resultBox.textContent = `✅ Komut gönderildi!\n\n${res.message}`;
                } else {
                    resultBox.className = 'result error';
                    resultBox.textContent = `❌ ${res.message}`;
                }
            });
        });
    </script>
</body>
</html>
