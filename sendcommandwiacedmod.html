<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AtomMod - Uzaktan Komut</title>
    <style>
        body { background: #0a0a0a; color: #ddd; font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 40px auto; padding: 30px; background: #111; border-radius: 12px; border: 2px solid #0f0; }
        label { display: block; margin: 15px 0 8px; font-weight: bold; color: #0f0; }
        select, input { width: 100%; padding: 14px; background: #1e1e1e; color: white; border: 1px solid #0f0; border-radius: 6px; font-size: 16px; }
        button { width: 100%; padding: 18px; margin-top: 25px; background: #0f0; color: black; border: none; border-radius: 8px; font-size: 19px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0c0; }
        .result { margin-top: 25px; padding: 18px; border-radius: 8px; min-height: 100px; white-space: pre-wrap; }
        .success { background: #002200; color: #0f0; }
        .error { background: #220000; color: #ff6666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 Uzaktan Komut Paneli (TCP)</h1>
        <p id="permissionInfo" style="text-align:center; font-size:20px; margin:20px 0;"></p>

        <label>Komut Türü:</label>
        <select id="commandSelect">
            <option value="broadcast">Broadcast</option>
            <option value="bc">Kısa Broadcast</option>
            <option value="roundrestart">Round Restart</option>
            <option value="cassie">Cassie</option>
            <option value="nuke">Nuke</option>
            <option value="stopnuke">Nuke Durdur</option>
            <option value="kick">Kick</option>
            <option value="raw">Raw Komut</option>
        </select>

        <label>Argüman / Mesaj:</label>
        <input type="text" id="commandArgs" placeholder="Mesaj veya argüman...">

        <button id="sendBtn">🚀 Komutu Gönder (TCP)</button>

        <div id="result" class="result"></div>
    </div>

    <script src="supabase.js"></script>
    <script src="app.js"></script>

    <script>
        async function getPermission() {
            return Number(sessionStorage.getItem('atommod_permission') || localStorage.getItem('atommod_permission') || 0);
        }

        window.addEventListener('load', async () => {
            const perm = await getPermission();
            const infoEl = document.getElementById('permissionInfo');

            if (perm >= 5) {
                infoEl.style.color = '#0f0';
                infoEl.innerHTML = `✅ Yetki: <strong>${perm}</strong> — TCP Komut aktif`;
            } else {
                infoEl.style.color = '#ff4444';
                infoEl.innerHTML = `❌ Yetki yetersiz (${perm})`;
                document.getElementById('sendBtn').disabled = true;
                return;
            }

document.getElementById('sendBtn').addEventListener('click', async () => {
    const cmdType = document.getElementById('commandSelect').value;
    const args = document.getElementById('commandArgs').value.trim();
    const fullCommand = args ? `${cmdType} ${args}` : cmdType;

    const resultBox = document.getElementById('result');
    resultBox.className = 'result';
    resultBox.textContent = 'Komut Pterodactyl API ile gönderiliyor...';

    // ←←← BURAYI KENDİ BİLGİLERİNLE DOLDUR ←←←
    const PANEL_URL = "https://panel.saganetwork.net";   // Saga panel adresin
    const SERVER_ID = "buraya_sunucu_id_ni_yaz";         // Örn: "abc123-def456"
    const API_KEY = "buraya_api_key_ni_yapistir";        // Çok uzun bir token

    const url = `${PANEL_URL}/api/client/servers/${SERVER_ID}/command`;

    try {
        const res = await fetch(url, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${API_KEY}`,
                'Content-Type': 'application/json',
                'Accept': 'application/json'
            },
            body: JSON.stringify({
                command: fullCommand
            })
        });

        if (res.status === 204 || res.ok) {
            resultBox.className = 'result success';
            resultBox.textContent = `✅ Komut başarıyla gönderildi!\n\n${fullCommand}`;
        } else {
            const errorText = await res.text();
            resultBox.className = 'result error';
            resultBox.textContent = `❌ Hata (${res.status}):\n${errorText}`;
        }
    } catch (err) {
        resultBox.className = 'result error';
        resultBox.textContent = `❌ Bağlantı hatası\n\nAPI Key veya Server ID yanlış olabilir.\n\nHata: ${err.message}`;
    }
});
        });
    </script>
</body>
</html>
