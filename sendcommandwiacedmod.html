<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AtomMod - Komut Paneli</title>
    <style>
        body { background: #0a0a0a; color: #ddd; font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 40px auto; padding: 30px; background: #111; border-radius: 12px; border: 3px solid #0f0; }
        h1 { text-align: center; color: #0f0; }
        .permission { text-align: center; font-size: 20px; margin: 20px 0; padding: 12px; border-radius: 8px; }
        label { display: block; margin: 15px 0 8px; font-weight: bold; color: #0f0; }
        input { width: 100%; padding: 14px; background: #1e1e1e; color: white; border: 1px solid #0f0; border-radius: 6px; font-size: 16px; }
        button { width: 100%; padding: 16px; margin-top: 25px; background: #0f0; color: black; border: none; border-radius: 8px; font-size: 19px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0c0; }
        .result { margin-top: 25px; padding: 18px; border-radius: 8px; min-height: 160px; white-space: pre-wrap; }
        .success { background: #002200; color: #0f0; }
        .error { background: #220000; color: #ff6666; }
        .commands { margin: 25px 0; display: flex; flex-wrap: wrap; gap: 8px; }
        .cmd-btn { padding: 10px 16px; background: #222; border: 1px solid #0f0; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .cmd-btn:hover { background: #0f0; color: black; }
        .players-list { margin-top: 30px; padding: 20px; background: #1a1a1a; border-radius: 10px; border: 1px solid #0f0; }
        :root { --primary: #00ff41; --bg: #0a0a0a; --card: #111; }
        body { background: var(--bg); color: #ddd; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; }
        .header {
            background: rgba(0,0,0,0.85);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--primary);
        }
        h1 { margin: 0; color: var(--primary); font-size: 1.8em; }
        .logout-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .logout-btn:hover { background: #cc0000; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 AtomMod Uzaktan Komut Paneli</h1>
        <p id="permissionInfo" class="permission"></p>

        <a href="accountsettings.html" style="text-decoration:none;">
            <button style="background:#5865F2; margin-bottom:15px;">🔗 Discord Hesabı Bağla</button>
        </a>

        <label>Komut Yazın:</label>
        <input type="text" id="commandArgs" placeholder="Komut yazın veya listeden seçin..." autofocus>

        <div class="commands" id="commandButtons"></div>

        <button id="sendBtn">🚀 Komutu Gönder</button>

        <div id="result" class="result"></div>

        <div class="players-list">
            <h3>🎮 Şu Anda Oyunda Olanlar (<span id="playerCount">0</span>)</h3>
            <div id="playersList">Yükleniyor...</div>
        </div>
    </div>

    <script src="supabase.js"></script>
    <script src="app.js"></script>
    <script>
        document.getElementById('logoutBtn').addEventListener('click', () => {
            if (confirm('Çıkış yapmak istediğinizden emin misiniz?')) {
                localStorage.removeItem('atommod_logged_in');
                localStorage.removeItem('atommod_lastuser');
                sessionStorage.clear();
                window.location.href = 'login.html';
            }
        });
        let CONFIG = {};
        let userPermission = 0;
        let permissionConfig = [];

        async function loadConfig() {
            try {
                const res = await fetch('https://lotusscp.github.io/atommodapi/config.json');
                CONFIG = await res.json();
                console.log("Config yüklendi");
            } catch (e) {
                console.error("Config yüklenemedi", e);
            }
        }

        async function loadPermissionConfig() {
            if (!CONFIG.supabase) return;
            try {
                const url = `${CONFIG.supabase.url}/rest/v1/permissionconfig?select=*`;
                const res = await fetch(url, {
                    headers: {
                        'apikey': CONFIG.supabase.anon_key,
                        'Authorization': `Bearer ${CONFIG.supabase.anon_key}`
                    }
                });
                permissionConfig = await res.json();
            } catch (e) {
                console.error("Permission config çekilemedi", e);
            }
        }

        function canUseCommand(cmd) {
            if (userPermission >= 65535) return true;

            const row = permissionConfig.find(p => p.permission === userPermission);
            if (!row) return false;

            const allowed = row.commandperm || [];
            const blacklisted = row.blacklisted || [];

            if (blacklisted.some(b => cmd.toLowerCase().includes(b.toLowerCase()))) return false;
            if (allowed.includes(".*")) return true;

            return allowed.some(a => cmd.toLowerCase().startsWith(a.toLowerCase()));
        }

        function createCommandButtons() {
            const container = document.getElementById('commandButtons');
            container.innerHTML = '';

            const cmds = [
                {text: "Broadcast", cmd: "broadcast Merhaba Sunucu!"},
                {text: "Round Restart", cmd: "roundrestart"},
                {text: "Cassie", cmd: "cassie Test mesajı"},
                {text: "Nuke", cmd: "nuke"},
                {text: "Stop Nuke", cmd: "stopnuke"},
                {text: "Players", cmd: "players"},
                {text: "Help", cmd: "help"}
            ];

            cmds.forEach(item => {
                const btn = document.createElement('div');
                btn.className = 'cmd-btn';
                btn.textContent = item.text;
                btn.onclick = () => document.getElementById('commandArgs').value = item.cmd;
                container.appendChild(btn);
            });
        }

        window.addEventListener('load', async () => {
            await loadConfig();
            await loadPermissionConfig();

            userPermission = Number(sessionStorage.getItem('atommod_permission') || 0);
            const infoEl = document.getElementById('permissionInfo');

            if (userPermission >= 5) {
                infoEl.style.background = '#002200';
                infoEl.style.color = '#0f0';
                infoEl.innerHTML = `✅ Yetki: <strong>${userPermission}</strong>`;
            } else {
                infoEl.style.background = '#220000';
                infoEl.style.color = '#ff6666';
                infoEl.innerHTML = `❌ Yetki yetersiz (${userPermission})`;
                document.getElementById('sendBtn').disabled = true;
                return;
            }

            createCommandButtons();

            loadPlayers();
            setInterval(loadPlayers, 8000);

            document.getElementById('sendBtn').addEventListener('click', async () => {
                let cmd = document.getElementById('commandArgs').value.trim();
                if (!cmd) return alert("Komut girin!");

                if (!canUseCommand(cmd)) {
                    return alert("❌ Bu komutu kullanma yetkiniz yok!");
                }

                const resultBox = document.getElementById('result');
                resultBox.className = 'result';
                resultBox.innerHTML = '🔄 Gönderiliyor...';

                try {
                    const res = await fetch(`${CONFIG.saganetwork.panel_url}/api/client/servers/${CONFIG.saganetwork.server_id}/command`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${CONFIG.saganetwork.api_key}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ command: cmd })
                    });

                    if (res.ok || res.status === 204) {
                        resultBox.className = 'result success';
                        resultBox.innerHTML = `✅ Komut gönderildi!<br><strong>${cmd}</strong>`;

                        if (CONFIG.discord_webhook) {
                            const user = localStorage.getItem('atommod_lastuser') || "Yetkili";
                            await fetch(CONFIG.discord_webhook, {
                                method: 'POST',
                                headers: {'Content-Type': 'application/json'},
                                body: JSON.stringify({ content: `${user} şu komudu kullandı:\n**${cmd}**` })
                            });
                        }
                    } else {
                        resultBox.className = 'result error';
                        resultBox.innerHTML = `❌ Hata (${res.status})`;
                    }
                } catch (err) {
                    resultBox.className = 'result error';
                    resultBox.innerHTML = `❌ Bağlantı hatası`;
                }
            });
        });

        async function loadPlayers() {
            const listEl = document.getElementById('playersList');
            const countEl = document.getElementById('playerCount');
            try {
                const res = await fetch(`${CONFIG.saganetwork.panel_url}/api/client/servers/${CONFIG.saganetwork.server_id}`, {
                    headers: { 'Authorization': `Bearer ${CONFIG.saganetwork.api_key}` }
                });
                const data = await res.json();
                const count = data.attributes?.player_count || 0;
                countEl.textContent = count;
                listEl.innerHTML = `<div style="color:#0f0">Şu anda <strong>${count}</strong> oyuncu oyunda.</div>`;
            } catch (e) {
                listEl.innerHTML = "Oyuncu listesi alınamadı.";
            }
        }
    </script>
</body>
</html>
