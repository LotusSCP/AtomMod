<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AtomMod - WebSocket Komut Paneli</title>
    <style>
        body { background:#0a0a0a; color:#ddd; font-family:Arial; margin:0; padding:20px; }
        .container { max-width:800px; margin:40px auto; padding:30px; background:#111; border-radius:12px; border:2px solid #0f0; }
        select, input { width:100%; padding:14px; margin:10px 0; background:#1f1f1f; color:white; border:1px solid #0f0; border-radius:6px; font-size:16px; }
        button { width:100%; padding:18px; margin-top:20px; background:#0f0; color:black; border:none; border-radius:8px; font-size:19px; cursor:pointer; }
        button:hover { background:#0c0; }
        .result { margin-top:25px; padding:18px; border-radius:8px; min-height:100px; font-size:16px; white-space:pre-wrap; }
        .success { background:#002200; color:#0f0; }
        .error { background:#220000; color:#ff6666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔌 WebSocket Komut Paneli</h1>
        <p id="permissionInfo" style="text-align:center; font-size:20px; margin:20px 0;"></p>

        <label>Komut Türü:</label>
        <select id="commandSelect">
            <option value="broadcast">Broadcast</option>
            <option value="roundrestart">Round Restart</option>
            <option value="cassie">Cassie</option>
            <option value="nuke">Nuke</option>
            <option value="kick">Kick</option>
        </select>

        <label>Argüman:</label>
        <input type="text" id="commandArgs" placeholder="Mesaj veya argüman...">

        <button id="sendBtn">Gönder</button>

        <div id="result" class="result"></div>
    </div>

    <script src="supabase.js"></script>
    <script src="app.js"></script>

    <script>
        let socket = null;

        function connect() {
            socket = new WebSocket("wss://s5.saganetwork.net:8080/api/servers/43ef2206-a5ff-4ff8-bfd5-9ac16a5dc11e/ws");

            socket.onopen = () => {
                console.log("WebSocket bağlandı");
                document.getElementById('result').innerHTML = "✅ WebSocket bağlantısı kuruldu";
            };

            socket.onmessage = (event) => {
                const resultBox = document.getElementById('result');
                resultBox.className = 'result success';
                resultBox.textContent = event.data;
            };

            socket.onerror = () => {
                document.getElementById('result').innerHTML = "❌ WebSocket bağlantı hatası";
            };
        }

        window.addEventListener('load', () => {
            connect();

            document.getElementById('sendBtn').addEventListener('click', () => {
                if (socket && socket.readyState === WebSocket.OPEN) {
                    const cmd = document.getElementById('commandSelect').value;
                    const args = document.getElementById('commandArgs').value.trim();

                    socket.send(JSON.stringify({ command: cmd, args: args }));
                    document.getElementById('result').innerHTML = "Komut gönderildi...";
                } else {
                    alert("WebSocket bağlı değil!");
                }
            });
        });
    </script>
</body>
</html>
