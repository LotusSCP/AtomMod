<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AtomMod - WebSocket Komut Paneli</title>
    <style>
        body { background: #0a0a0a; color: #ddd; font-family: Arial, sans-serif; }
        .container { max-width: 800px; margin: 40px auto; padding: 30px; background: #111; border-radius: 12px; border: 2px solid #0f0; }
        select, input { width: 100%; padding: 14px; margin: 10px 0; background: #1f1f1f; color: white; border: 1px solid #0f0; border-radius: 6px; }
        button { width: 100%; padding: 16px; margin-top: 20px; background: #0f0; color: black; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
        button:hover { background: #0c0; }
        .result { margin-top: 20px; padding: 15px; border-radius: 8px; min-height: 100px; }
        .success { background: #002200; color: #0f0; }
        .error { background: #220000; color: #ff6666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔌 WebSocket Komut Paneli</h1>
        <p id="permissionInfo" style="text-align:center; font-size:20px;"></p>

        <label>Komut:</label>
        <select id="commandSelect">
            <option value="broadcast">Broadcast</option>
            <option value="roundrestart">Round Restart</option>
            <option value="cassie">Cassie</option>
            <option value="nuke">Nuke</option>
            <option value="kick">Kick</option>
        </select>

        <label>Argüman:</label>
        <input type="text" id="commandArgs" placeholder="Mesaj veya argüman...">

        <button id="sendBtn">Gönder</button>

        <div id="result" class="result"></div>
    </div>

    <script>
        let ws = null;

        function connectWebSocket() {
            ws = new WebSocket("ws://atommod.mcsunucun.com:29075/ws/");

            ws.onopen = () => {
                console.log("WebSocket bağlantısı kuruldu");
            };

            ws.onmessage = (event) => {
                const resultBox = document.getElementById('result');
                resultBox.className = 'result success';
                resultBox.textContent = event.data;
            };

            ws.onerror = (err) => {
                console.error("WebSocket hatası", err);
            };
        }

        window.addEventListener('load', () => {
            connectWebSocket();

            document.getElementById('sendBtn').addEventListener('click', () => {
                const cmd = document.getElementById('commandSelect').value;
                const args = document.getElementById('commandArgs').value.trim();

                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ command: cmd, args: args }));
                    document.getElementById('result').textContent = "Komut gönderildi...";
                } else {
                    alert("WebSocket bağlantısı yok!");
                }
            });
        });
    </script>
</body>
</html>
