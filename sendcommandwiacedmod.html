<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AtomMod - CedMod Komut Paneli</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body { background: #0a0a0a; color: #ddd; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        .header { 
            background: linear-gradient(to right, #0f0, #008000); 
            color: black; 
            padding: 18px; 
            text-align: center; 
            font-size: 24px; 
            font-weight: bold; 
        }
        .container { 
            max-width: 900px; 
            margin: 20px auto; 
            padding: 30px; 
            background: #111; 
            border-radius: 12px; 
            border: 2px solid #0f0; 
        }
        select, input { 
            width: 100%; 
            padding: 14px; 
            margin: 12px 0; 
            background: #1f1f1f; 
            color: white; 
            border: 1px solid #0f0; 
            border-radius: 6px; 
            font-size: 17px; 
        }
        button { 
            width: 100%; 
            padding: 18px; 
            font-size: 20px; 
            background: #0f0; 
            color: black; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            margin-top: 25px; 
            font-weight: bold;
        }
        button:hover { background: #0c0; }
        .result { 
            margin-top: 25px; 
            padding: 18px; 
            border-radius: 8px; 
            min-height: 100px; 
            font-size: 16px; 
            white-space: pre-wrap; 
        }
        .success { background: #002200; color: #0f0; }
        .error { background: #220000; color: #ff6666; }
        .permission-ok { color: #0f0; font-size: 20px; }
    </style>
</head>
<body>
    <div class="header">AtomMod × CedMod Komut Paneli</div>

    <div class="container">
        <p id="permissionInfo" class="permission-ok"></p>

        <label>Komut Türü:</label>
        <select id="commandSelect">
            <option value="broadcast">Broadcast Mesajı</option>
            <option value="bc">Kısa Broadcast</option>
            <option value="roundrestart">Round Restart</option>
            <option value="cassie">Cassie Mesajı</option>
            <option value="nuke">Nuke Başlat</option>
            <option value="stopnuke">Nuke Durdur</option>
            <option value="kick">Kick Oyuncu</option>
        </select>

        <label>Argüman / Mesaj:</label>
        <input type="text" id="commandArgs" placeholder="Mesaj veya argüman yazın...">

        <button id="sendBtn">🚀 Komutu CedMod ile Gönder</button>

        <div id="result" class="result"></div>
    </div>

    <script src="supabase.js"></script>
    <script src="app.js"></script>

    <script>
        // Basit ve Güvenilir Yetki Kontrolü
        function getPermission() {
            // 1. SessionStorage'dan al (login sonrası kaydedilen)
            let perm = Number(sessionStorage.getItem('atommod_permission'));
            
            // 2. LocalStorage'dan al (fallback)
            if (!perm) perm = Number(localStorage.getItem('atommod_permission'));
            
            // 3. Varsayılan değer
            if (!perm) perm = 0;

            return perm;
        }

        window.addEventListener('load', async () => {
            const perm = getPermission();
            const infoEl = document.getElementById('permissionInfo');

            console.log("Mevcut yetki seviyesi:", perm);

            if (perm >= 5) {
                infoEl.innerHTML = `✅ Yetki seviyesi: <b>${perm}</b> — Komut gönderme aktif`;
            } else {
                infoEl.innerHTML = `❌ Yetki yetersiz (${perm})`;
                document.getElementById('sendBtn').disabled = true;
                return;
            }

            // Komut Gönderme
            document.getElementById('sendBtn').addEventListener('click', async () => {
                const cmd = document.getElementById('commandSelect').value;
                const args = document.getElementById('commandArgs').value.trim();
                const resultBox = document.getElementById('result');

                resultBox.className = 'result';
                resultBox.textContent = 'Komut gönderiliyor...';

                const res = await window.sendServerCommand(cmd, args);

                if (res.ok) {
                    resultBox.className = 'result success';
                    resultBox.textContent = `✅ Komut gönderildi!\n\n${res.message}`;
                } else {
                    resultBox.className = 'result error';
                    resultBox.textContent = `❌ ${res.message}`;
                }
            });
        });
    </script>
</body>
</html>
