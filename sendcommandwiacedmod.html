<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AtomMod - SagaNetwork Komut Paneli</title>
    <style>
        body { background: #0a0a0a; color: #ddd; font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 40px auto; padding: 30px; background: #111; border-radius: 12px; border: 3px solid #0f0; }
        h1 { text-align: center; color: #0f0; }
        .permission { text-align: center; font-size: 20px; margin: 20px 0; padding: 12px; border-radius: 8px; }
        label { display: block; margin: 15px 0 8px; font-weight: bold; color: #0f0; }
        input { width: 100%; padding: 14px; background: #1e1e1e; color: white; border: 1px solid #0f0; border-radius: 6px; font-size: 16px; }
        button { width: 100%; padding: 16px; margin-top: 25px; background: #0f0; color: black; border: none; border-radius: 8px; font-size: 19px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0c0; }
        .result { margin-top: 25px; padding: 18px; border-radius: 8px; min-height: 140px; white-space: pre-wrap; }
        .success { background: #002200; color: #0f0; }
        .error { background: #220000; color: #ff6666; }
        .players-list { 
            margin-top: 30px; 
            padding: 20px; 
            background: #1a1a1a; 
            border-radius: 10px; 
            border: 1px solid #0f0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔧 AtomMod Uzaktan Komut Paneli</h1>
        <p id="permissionInfo" class="permission"></p>

        <label>Komut Yazın (Raw):</label>
        <input type="text" id="commandArgs" placeholder="Örn: broadcast Merhaba, roundrestart, cassie Test..." autofocus>

        <button id="sendBtn">🚀 Komutu Gönder</button>

        <div id="result" class="result"></div>

        <!-- Oyuncu Listesi -->
        <div class="players-list">
            <h3>🎮 Şu Anda Oyunda Olanlar (<span id="playerCount">0</span>)</h3>
            <div id="playersList">Oyuncu listesi yükleniyor...</div>
        </div>
    </div>

    <script src="supabase.js"></script>
    <script src="app.js"></script>
    <script>
        const PANEL_URL = "https://panel.saganetwork.net";
        const SERVER_ID = "43ef2206-a5ff-4ff8-bfd5-9ac16a5dc11e";
        const API_KEY   = "ptlc_YsIfuDZimR2TLQcXqjfVnxtLmBuNTlmHcqYXE5TTtI9";

        // ====================== DISCORD WEBHOOK ======================
        const DISCORD_WEBHOOK = "BURAYA_WEBHOOK_URL_NI_YAPISTIR";   // ← Burayı doldur

        // ====================== DISCORD LOG (EMAIL İLE) ======================
        async function sendDiscordLog(email, command) {
            if (!DISCORD_WEBHOOK || DISCORD_WEBHOOK.includes("BURAYA")) return;

            const user = email || "Yetkili";

            const payload = {
                content: `${user} şu komudu kullandı:\n**${command}**`,
                username: "AtomMod Komut Log",
                avatar_url: "https://i.imgur.com/0Z8v4zL.png"
            };

            try {
                await fetch(DISCORD_WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } catch (e) {
                console.log("Discord log gönderilemedi:", e);
            }
        }

        // ====================== OYUNCU LİSTESİ ======================
        async function loadPlayers() {
            const listEl = document.getElementById('playersList');
            const countEl = document.getElementById('playerCount');

            try {
                const res = await fetch(`${PANEL_URL}/api/client/servers/${SERVER_ID}`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Accept': 'application/json'
                    }
                });

                if (!res.ok) throw new Error("Bilgi alınamadı");

                const data = await res.json();
                const playerCount = data.attributes?.player_count || 0;

                countEl.textContent = playerCount;
                listEl.innerHTML = `<div class="player-item">📊 Şu anda <strong>${playerCount}</strong> oyuncu oyunda.</div>`;

            } catch (err) {
                listEl.innerHTML = `<span style="color:#ff6666">Oyuncu sayısı alınamadı.</span>`;
            }
        }

        // ====================== KOMUT GÖNDERME ======================
        window.addEventListener('load', async () => {
            const perm = Number(sessionStorage.getItem('atommod_permission') || 0);
            const infoEl = document.getElementById('permissionInfo');

            if (perm >= 5) {
                infoEl.style.background = '#002200';
                infoEl.style.color = '#0f0';
                infoEl.innerHTML = `✅ Yetki: <strong>${perm}</strong> — Komut aktif`;
            } else {
                infoEl.style.background = '#220000';
                infoEl.style.color = '#ff6666';
                infoEl.innerHTML = `❌ Yetki yetersiz (${perm})`;
                document.getElementById('sendBtn').disabled = true;
                return;
            }

            loadPlayers();
            setInterval(loadPlayers, 8000);

            document.getElementById('sendBtn').addEventListener('click', async () => {
                let cmd = document.getElementById('commandArgs').value.trim();
                if (!cmd) return alert("Komut girin!");

                const resultBox = document.getElementById('result');
                resultBox.className = 'result';
                resultBox.innerHTML = '🔄 Komut gönderiliyor...';

                const currentEmail = localStorage.getItem('atommod_lastuser') || "Yetkili";   // email olarak kullanıyoruz

                try {
                    const res = await fetch(`${PANEL_URL}/api/client/servers/${SERVER_ID}/command`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${API_KEY}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ command: cmd })
                    });

                    if (res.ok || res.status === 204) {
                        resultBox.className = 'result success';
                        resultBox.innerHTML = `✅ Komut başarıyla gönderildi!<br><strong>${cmd}</strong>`;

                        // Discord Log At (email ile)
                        await sendDiscordLog(currentEmail, cmd);
                    } else {
                        resultBox.className = 'result error';
                        resultBox.innerHTML = `❌ Hata (${res.status})`;
                    }
                } catch (err) {
                    resultBox.className = 'result error';
                    resultBox.innerHTML = `❌ Bağlantı hatası: ${err.message}`;
                }
            });

            document.getElementById('commandArgs').addEventListener('keypress', (e) => {
                if (e.key === "Enter") document.getElementById('sendBtn').click();
            });
        });
    </script>
</body>
</html>
