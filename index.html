<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AtomMod - Kontrol Paneli</title>
    <style>
        :root {
            --primary: #00ff00;
            --bg: #0a0a0a;
            --card: #111;
        }
        body {
            background: var(--bg);
            color: #ddd;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .header {
            background: rgba(0,0,0,0.8);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--primary);
        }
        h1 { color: var(--primary); margin: 0; }
        .nav {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin: 25px 0;
        }
        .nav a {
            color: #ddd;
            text-decoration: none;
            padding: 12px 24px;
            background: #1a1a1a;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .nav a:hover {
            background: var(--primary);
            color: black;
            transform: translateY(-2px);
        }
        .card {
            background: var(--card);
            border: 2px solid var(--primary);
            border-radius: 12px;
            padding: 30px;
            margin: 20px auto;
            max-width: 900px;
            box-shadow: 0 0 20px rgba(0,255,0,0.1);
        }
        .status { text-align: center; font-size: 18px; margin: 15px 0; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔧 AtomMod Kontrol Paneli</h1>
    </div>

    <div class="nav">
        <a href="sendcommandwiacedmod.html">Komut Paneli</a>
        <a href="kontrol.html">Sunucu Kontrol</a>
        <a href="status.html">Sunucu Durumu</a>
        <a href="accountsettings.html">Hesap Ayarları</a>
    </div>

    <div class="card">
        <div id="welcome" class="status"></div>
        <p style="text-align:center; color:#888;">
            Hoş geldiniz. Yetkinize göre komut gönderebilir ve sunucuyu yönetebilirsiniz.
        </p>
    </div>

    <script src="app.js"></script>
    <script>
        window.addEventListener('load', () => {
            const isLoggedIn = localStorage.getItem('atommod_logged_in') === 'true';
            const username = localStorage.getItem('atommod_lastuser') || 'Misafir';

            const welcomeEl = document.getElementById('welcome');

            if (isLoggedIn) {
                welcomeEl.innerHTML = `✅ Hoş geldiniz, <strong>${username}</strong>`;
                welcomeEl.style.color = '#0f0';
            } else {
                welcomeEl.innerHTML = `❌ Giriş yapmadınız. Lütfen <a href="login.html" style="color:#0f0;">giriş yapın</a>.`;
                welcomeEl.style.color = '#ff6666';
            }
        });
    </script>
</body>
</html>
