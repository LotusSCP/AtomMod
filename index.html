<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AtomMod - Kontrol Paneli</title>
    <style>
        :root {
            --primary: #00ff41;
            --bg: #0a0a0a;
            --card: #111111;
        }
        * { box-sizing: border-box; }
        body {
            background: var(--bg);
            color: #ddd;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .header {
            background: rgba(0,0,0,0.85);
            padding: 25px;
            text-align: center;
            border-bottom: 3px solid var(--primary);
        }
        h1 { margin: 0; color: var(--primary); font-size: 2.2em; }
        .nav {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            padding: 30px 20px;
        }
        .nav a {
            color: #ddd;
            text-decoration: none;
            padding: 14px 28px;
            background: #1a1a1a;
            border-radius: 10px;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .nav a:hover {
            background: var(--primary);
            color: black;
            transform: translateY(-3px);
        }
        .card {
            background: var(--card);
            border: 2px solid var(--primary);
            border-radius: 16px;
            padding: 35px;
            margin: 30px auto;
            max-width: 900px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0, 255, 65, 0.08);
        }
        .status { font-size: 1.3em; margin: 15px 0; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔧 AtomMod Kontrol Paneli</h1>
    </div>

    <div class="nav">
        <a href="sendcommandwiacedmod.html">Komut Paneli</a>
        <a href="kontrol.html">Sunucu Kontrol</a>
        <a href="status.html">Sunucu Durumu</a>
        <a href="accountsettings.html">Hesap Ayarları</a>
    </div>

    <div class="card">
        <div id="welcome" class="status"></div>
        <p style="color:#888; font-size:1.1em;">
            Hoş geldiniz. Yetkinize göre komut gönderebilir ve sunucuyu yönetebilirsiniz.
        </p>
    </div>

    <script src="app.js"></script>
    <script>
        window.addEventListener('load', () => {
            const isLoggedIn = localStorage.getItem('atommod_logged_in') === 'true';
            const username = localStorage.getItem('atommod_lastuser') || 'Misafir';

            const welcomeEl = document.getElementById('welcome');

            if (isLoggedIn) {
                welcomeEl.innerHTML = `✅ Hoş geldiniz, <strong>${username}</strong>`;
                welcomeEl.style.color = '#00ff41';
            } else {
                welcomeEl.innerHTML = `❌ Giriş yapmadınız. Lütfen <a href="login.html" style="color:#00ff41;">giriş yapın</a>.`;
                welcomeEl.style.color = '#ff6666';
            }
        });
    </script>
</body>
</html>
