<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AtomMod - Ana Sayfa</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .nav-link { margin: 0 12px; text-decoration: none; }
        .logged-in { color: #0f0; font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <h1>AtomMod - Kontrol Paneli</h1>
        
        <nav id="mainNav">
            <a href="status.html" class="nav-link">Sunucu Durumu</a>
            <a href="login.html" id="loginLink" class="nav-link">Giriş Yap</a>
            <a href="register.html" id="registerLink" class="nav-link">Kayıt Ol</a>
            <a href="#" id="logoutLink" class="nav-link" style="display:none; color:#f66;">Çıkış Yap</a>
        </nav>
    </header>

    <main>
        <section>
            <h2 id="welcomeHeading">Hoş geldiniz</h2>
            <p id="welcomeText">AtomMod web paneline hoş geldiniz.</p>
            
            <div id="loginStatus" style="display: none; margin: 15px 0; padding: 10px; border-radius: 6px;">
                <!-- Dinamik doldurulacak -->
            </div>
        </section>

        <section>
            <h3>Kullanım</h3>
            <ul>
                <li>Supabase üzerinden kayıt ve giriş yapabilirsiniz.</li>
                <li>Sunucu durumu ve oyuncu istatistikleri Supabase ile senkronize çalışır.</li>
            </ul>
        </section>
    </main>

    <script src="supabase.js"></script>
    <script src="app.js"></script>

    <script>
        function updateLoginUI() {
            const isLoggedIn = localStorage.getItem('atommod_logged_in') === 'true';
            const username = localStorage.getItem('atommod_lastuser') || '';

            const loginLink = document.getElementById('loginLink');
            const registerLink = document.getElementById('registerLink');
            const logoutLink = document.getElementById('logoutLink');
            const loginStatus = document.getElementById('loginStatus');
            const welcomeHeading = document.getElementById('welcomeHeading');
            const welcomeText = document.getElementById('welcomeText');

            if (isLoggedIn) {
                loginLink.style.display = 'none';
                registerLink.style.display = 'none';
                logoutLink.style.display = 'inline';

                welcomeHeading.textContent = username ? `Hoş geldiniz, ${username}` : 'Hoş geldiniz';
                welcomeText.textContent = 'Supabase ile bağlantınız aktif.';

                loginStatus.style.display = 'block';
                loginStatus.className = 'logged-in';
                loginStatus.innerHTML = `✅ Giriş yaptınız → <strong>${username || 'Kullanıcı'}</strong>`;
            } else {
                loginLink.style.display = 'inline';
                registerLink.style.display = 'inline';
                logoutLink.style.display = 'none';
                loginStatus.style.display = 'none';

                welcomeHeading.textContent = 'Hoş geldiniz';
                welcomeText.textContent = 'AtomMod web paneline hoş geldiniz.';
            }
        }

        // Çıkış Yap
        document.getElementById('logoutLink').addEventListener('click', (e) => {
            e.preventDefault();
            if (confirm('Çıkış yapmak istediğinizden emin misiniz?')) {
                localStorage.removeItem('atommod_logged_in');
                localStorage.removeItem('atommod_lastuser');
                window.location.reload();
            }
        });

        // Sayfa yüklendiğinde
        window.addEventListener('load', () => {
            updateLoginUI();
            console.log('✅ AtomMod Ana Sayfa yüklendi.');
        });
    </script>
</body>
</html>
