<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AtomMod - Kontrol Paneli</title>
    <style>
        :root { --primary: #00ff41; --bg: #0a0a0a; --card: #111; }
        body { background: var(--bg); color: #ddd; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; }
        .header {
            background: rgba(0,0,0,0.85);
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        h1 { margin: 0; color: var(--primary); }
        .logout-btn {
            background: #ff4444;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .logout-btn:hover { background: #cc0000; }
        .nav {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            padding: 30px 20px;
        }
        .nav a {
            color: #ddd;
            text-decoration: none;
            padding: 14px 28px;
            background: #1a1a1a;
            border-radius: 10px;
            transition: all 0.3s;
        }
        .nav a:hover {
            background: var(--primary);
            color: black;
        }
        .card {
            background: var(--card);
            border: 2px solid var(--primary);
            border-radius: 16px;
            padding: 40px;
            margin: 30px auto;
            max-width: 900px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔧 AtomMod Kontrol Paneli</h1>
        <button class="logout-btn" id="logoutBtn">Çıkış Yap</button>
    </div>

    <div class="nav">
        <a href="sendcommandwiacedmod.html">Komut Paneli</a>
        <a href="kontrol.html">Sunucu Kontrol</a>
        <a href="status.html">Sunucu Durumu</a>
        <a href="accountsettings.html">Hesap Ayarları</a>
    </div>

    <div class="card">
        <div id="welcome" style="font-size:1.4em; margin-bottom:15px;"></div>
        <p style="color:#888;">Hoş geldiniz. Yetkinize göre komut gönderebilir ve sunucuyu yönetebilirsiniz.</p>
    </div>

    <script src="app.js"></script>
    <script>
        window.addEventListener('load', () => {
            const isLoggedIn = localStorage.getItem('atommod_logged_in') === 'true';
            const username = localStorage.getItem('atommod_lastuser') || 'Misafir';

            const welcomeEl = document.getElementById('welcome');

            if (isLoggedIn) {
                welcomeEl.innerHTML = `✅ Hoş geldiniz, <strong>${username}</strong>`;
                welcomeEl.style.color = '#00ff41';
            } else {
                welcomeEl.innerHTML = `❌ Giriş yapmadınız. Lütfen <a href="login.html" style="color:#00ff41;">giriş yapın</a>.`;
                welcomeEl.style.color = '#ff6666';
            }
        });

        // Çıkış Yap Butonu
        document.getElementById('logoutBtn').addEventListener('click', () => {
            if (confirm('Çıkış yapmak istediğinizden emin misiniz?')) {
                localStorage.removeItem('atommod_logged_in');
                localStorage.removeItem('atommod_lastuser');
                sessionStorage.clear();
                window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
